      - DNSClusterFirst
      - DNSDefault
      - DNSNone
    v1.DownwardAPIProjection:
      properties:
        items:
          description: |-
            Items is a list of DownwardAPIVolume file
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.DownwardAPIVolumeFile"
          type: array
      type: object
    v1.DownwardAPIVolumeFile:
      properties:
        fieldRef:
          allOf:
          - $ref: "#/components/schemas/v1.ObjectFieldSelector"
          description: |-
            Required: Selects a field of the pod: only annotations, labels, name, namespace and uid are supported.
            +optional
          type: object
        mode:
          description: |-
            Optional: mode bits used to set permissions on this file, must be an octal value
            between 0000 and 0777 or a decimal value between 0 and 511.
            YAML accepts both octal and decimal values, JSON requires decimal values for mode bits.
            If not specified, the volume defaultMode will be used.
            This might be in conflict with other options that affect the file
            mode, like fsGroup, and the result can be other mode bits set.
            +optional
          type: integer
        path:
          description: "Required: Path is  the relative path name of the file to be\
            \ created. Must not be absolute or contain the '..' path. Must be utf-8\
            \ encoded. The first item of the relative path must not start with '..'"
          type: string
        resourceFieldRef:
          allOf:
          - $ref: "#/components/schemas/v1.ResourceFieldSelector"
          description: |-
            Selects a resource of the container: only resources limits and requests
            (limits.cpu, limits.memory, requests.cpu and requests.memory) are currently supported.
            +optional
          type: object
      type: object
    v1.DownwardAPIVolumeSource:
      properties:
        defaultMode:
          description: |-
            Optional: mode bits to use on created files by default. Must be a
            Optional: mode bits used to set permissions on created files by default.
            Must be an octal value between 0000 and 0777 or a decimal value between 0 and 511.
            YAML accepts both octal and decimal values, JSON requires decimal values for mode bits.
            Defaults to 0644.
            Directories within the path are not affected by this setting.
            This might be in conflict with other options that affect the file
            mode, like fsGroup, and the result can be other mode bits set.
            +optional
          type: integer
        items:
          description: |-
            Items is a list of downward API volume file
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.DownwardAPIVolumeFile"
          type: array
      type: object
    v1.EmptyDirVolumeSource:
      properties:
        medium:
          allOf:
          - $ref: "#/components/schemas/v1.StorageMedium"
          description: |-
            medium represents what type of storage medium should back this directory.
            The default is "" which means to use the node's default medium.
            Must be an empty string (default) or Memory.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#emptydir
            +optional
          type: object
        sizeLimit:
          description: |-
            sizeLimit is the total amount of local storage required for this EmptyDir volume.
            The size limit is also applicable for memory medium.
            The maximum usage on memory medium EmptyDir would be the minimum value between
            the SizeLimit specified here and the sum of memory limits of all containers in a pod.
            The default is nil which means that the limit is undefined.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#emptydir
            +optional
          type: string
      type: object
    v1.EnvFromSource:
      example:
        configMapRef: "{}"
        prefix: prefix
        secretRef: "{}"
      properties:
        configMapRef:
          allOf:
          - $ref: "#/components/schemas/v1.ConfigMapEnvSource"
          description: |-
            The ConfigMap to select from
            +optional
          type: object
        prefix:
          description: |-
            Optional text to prepend to the name of each environment variable.
            May consist of any printable ASCII characters except '='.
            +optional
          type: string
        secretRef:
          allOf:
          - $ref: "#/components/schemas/v1.SecretEnvSource"
          description: |-
            The Secret to select from
            +optional
          type: object
      type: object
    v1.EnvVar:
      example:
        name: name
        value: value
        valueFrom: "{}"
      properties:
        name:
          description: |-
            Name of the environment variable.
            May consist of any printable ASCII characters except '='.
          type: string
        value:
          description: |-
            Variable references $(VAR_NAME) are expanded
            using the previously defined environment variables in the container and
            any service environment variables. If a variable cannot be resolved,
            the reference in the input string will be unchanged. Double $$ are reduced
            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.
            "$$(VAR_NAME)" will produce the string literal "$(VAR_NAME)".
            Escaped references will never be expanded, regardless of whether the variable
            exists or not.
            Defaults to "".
            +optional
          type: string
        valueFrom:
          allOf:
          - $ref: "#/components/schemas/v1.EnvVarSource"
          description: |-
            Source for the environment variable's value. Cannot be used if value is not empty.
            +optional
          type: object
      type: object
    v1.EnvVarSource:
      properties:
        configMapKeyRef:
          allOf:
          - $ref: "#/components/schemas/v1.ConfigMapKeySelector"
          description: |-
            Selects a key of a ConfigMap.
            +optional
          type: object
        fieldRef:
          allOf:
          - $ref: "#/components/schemas/v1.ObjectFieldSelector"
          description: |-
            Selects a field of the pod: supports metadata.name, metadata.namespace, `metadata.labels['<KEY>']`, `metadata.annotations['<KEY>']`,
            spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.
            +optional
          type: object
        fileKeyRef:
          allOf:
          - $ref: "#/components/schemas/v1.FileKeySelector"
          description: |-
            FileKeyRef selects a key of the env file.
            Requires the EnvFiles feature gate to be enabled.

            +featureGate=EnvFiles
            +optional
          type: object
        resourceFieldRef:
          allOf:
          - $ref: "#/components/schemas/v1.ResourceFieldSelector"
          description: |-
            Selects a resource of the container: only resources limits and requests
            (limits.cpu, limits.memory, limits.ephemeral-storage, requests.cpu, requests.memory and requests.ephemeral-storage) are currently supported.
            +optional
          type: object
        secretKeyRef:
          allOf:
          - $ref: "#/components/schemas/v1.SecretKeySelector"
          description: |-
            Selects a key of a secret in the pod's namespace
            +optional
          type: object
      type: object
    v1.EphemeralContainer:
      example:
        volumeDevices:
        - devicePath: devicePath
          name: name
        - devicePath: devicePath
          name: name
        restartPolicyRules:
        - action: "{}"
          exitCodes: "{}"
        - action: "{}"
          exitCodes: "{}"
        stdin: true
        terminationMessagePolicy: "{}"
        securityContext: "{}"
        startupProbe: "{}"
        ports:
        - protocol: "{}"
          hostIP: hostIP
          name: name
          containerPort: 1
          hostPort: 5
        - protocol: "{}"
          hostIP: hostIP
          name: name
          containerPort: 1
          hostPort: 5
        volumeMounts:
        - mountPath: mountPath
          mountPropagation: "{}"
          name: name
          readOnly: true
          subPath: subPath
          recursiveReadOnly: "{}"
          subPathExpr: subPathExpr
        - mountPath: mountPath
          mountPropagation: "{}"
          name: name
          readOnly: true
          subPath: subPath
          recursiveReadOnly: "{}"
          subPathExpr: subPathExpr
        lifecycle: "{}"
        readinessProbe: "{}"
        resizePolicy:
        - resourceName: "{}"
          restartPolicy: "{}"
        - resourceName: "{}"
          restartPolicy: "{}"
        envFrom:
        - configMapRef: "{}"
          prefix: prefix
          secretRef: "{}"
        - configMapRef: "{}"
          prefix: prefix
          secretRef: "{}"
        image: image
        imagePullPolicy: "{}"
        livenessProbe: "{}"
        targetContainerName: targetContainerName
        terminationMessagePath: terminationMessagePath
        workingDir: workingDir
        resources: "{}"
        env:
        - name: name
          value: value
          valueFrom: "{}"
        - name: name
          value: value
          valueFrom: "{}"
        restartPolicy: "{}"
        command:
        - command
        - command
        args:
        - args
        - args
        name: name
        tty: true
        stdinOnce: true
      properties:
        args:
          description: |-
            Arguments to the entrypoint.
            The image's CMD is used if this is not provided.
            Variable references $(VAR_NAME) are expanded using the container's environment. If a variable
            cannot be resolved, the reference in the input string will be unchanged. Double $$ are reduced
            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e. "$$(VAR_NAME)" will
            produce the string literal "$(VAR_NAME)". Escaped references will never be expanded, regardless
            of whether the variable exists or not. Cannot be updated.
            More info: https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/#running-a-command-in-a-shell
            +optional
            +listType=atomic
          items:
            type: string
          type: array
        command:
          description: |-
            Entrypoint array. Not executed within a shell.
            The image's ENTRYPOINT is used if this is not provided.
            Variable references $(VAR_NAME) are expanded using the container's environment. If a variable
            cannot be resolved, the reference in the input string will be unchanged. Double $$ are reduced
            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e. "$$(VAR_NAME)" will
            produce the string literal "$(VAR_NAME)". Escaped references will never be expanded, regardless
            of whether the variable exists or not. Cannot be updated.
            More info: https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/#running-a-command-in-a-shell
            +optional
            +listType=atomic
          items:
            type: string
          type: array
        env:
          description: |-
            List of environment variables to set in the container.
            Cannot be updated.
            +optional
            +patchMergeKey=name
            +patchStrategy=merge
            +listType=map
            +listMapKey=name
          items:
            $ref: "#/components/schemas/v1.EnvVar"
          type: array
        envFrom:
          description: |-
            List of sources to populate environment variables in the container.
            The keys defined within a source may consist of any printable ASCII characters except '='.
            When a key exists in multiple
            sources, the value associated with the last source will take precedence.
            Values defined by an Env with a duplicate key will take precedence.
            Cannot be updated.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.EnvFromSource"
          type: array
        image:
          description: |-
            Container image name.
            More info: https://kubernetes.io/docs/concepts/containers/images
          type: string
        imagePullPolicy:
          allOf:
          - $ref: "#/components/schemas/v1.PullPolicy"
          description: |-
            Image pull policy.
            One of Always, Never, IfNotPresent.
            Defaults to Always if :latest tag is specified, or IfNotPresent otherwise.
            Cannot be updated.
            More info: https://kubernetes.io/docs/concepts/containers/images#updating-images
            +optional
          type: object
        lifecycle:
          allOf:
          - $ref: "#/components/schemas/v1.Lifecycle"
          description: |-
            Lifecycle is not allowed for ephemeral containers.
            +optional
          type: object
        livenessProbe:
          allOf:
          - $ref: "#/components/schemas/v1.Probe"
          description: |-
            Probes are not allowed for ephemeral containers.
            +optional
          type: object
        name:
          description: |-
            Name of the ephemeral container specified as a DNS_LABEL.
            This name must be unique among all containers, init containers and ephemeral containers.
          type: string
        ports:
          description: |-
            Ports are not allowed for ephemeral containers.
            +optional
            +patchMergeKey=containerPort
            +patchStrategy=merge
            +listType=map
            +listMapKey=containerPort
            +listMapKey=protocol
          items:
            $ref: "#/components/schemas/v1.ContainerPort"
          type: array
        readinessProbe:
          allOf:
          - $ref: "#/components/schemas/v1.Probe"
          description: |-
            Probes are not allowed for ephemeral containers.
            +optional
          type: object
        resizePolicy:
          description: |-
            Resources resize policy for the container.
            +featureGate=InPlacePodVerticalScaling
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.ContainerResizePolicy"
          type: array
        resources:
          allOf:
          - $ref: "#/components/schemas/v1.ResourceRequirements"
          description: |-
            Resources are not allowed for ephemeral containers. Ephemeral containers use spare resources
            already allocated to the pod.
            +optional
          type: object
        restartPolicy:
          allOf:
          - $ref: "#/components/schemas/v1.ContainerRestartPolicy"
          description: |-
            Restart policy for the container to manage the restart behavior of each
            container within a pod.
            You cannot set this field on ephemeral containers.
            +optional
          type: object
        restartPolicyRules:
          description: |-
            Represents a list of rules to be checked to determine if the
            container should be restarted on exit. You cannot set this field on
            ephemeral containers.
            +featureGate=ContainerRestartRules
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.ContainerRestartRule"
          type: array
        securityContext:
          allOf:
          - $ref: "#/components/schemas/v1.SecurityContext"
          description: |-
            Optional: SecurityContext defines the security options the ephemeral container should be run with.
            If set, the fields of SecurityContext override the equivalent fields of PodSecurityContext.
            +optional
          type: object
        startupProbe:
          allOf:
          - $ref: "#/components/schemas/v1.Probe"
          description: |-
            Probes are not allowed for ephemeral containers.
            +optional
          type: object
        stdin:
          description: |-
            Whether this container should allocate a buffer for stdin in the container runtime. If this
            is not set, reads from stdin in the container will always result in EOF.
            Default is false.
            +optional
          type: boolean
        stdinOnce:
          description: |-
            Whether the container runtime should close the stdin channel after it has been opened by
            a single attach. When stdin is true the stdin stream will remain open across multiple attach
            sessions. If stdinOnce is set to true, stdin is opened on container start, is empty until the
            first client attaches to stdin, and then remains open and accepts data until the client disconnects,
            at which time stdin is closed and remains closed until the container is restarted. If this
            flag is false, a container processes that reads from stdin will never receive an EOF.
            Default is false
            +optional
          type: boolean
        targetContainerName:
          description: |-
            If set, the name of the container from PodSpec that this ephemeral container targets.
            The ephemeral container will be run in the namespaces (IPC, PID, etc) of this container.
            If not set then the ephemeral container uses the namespaces configured in the Pod spec.

            The container runtime must implement support for this feature. If the runtime does not
            support namespace targeting then the result of setting this field is undefined.
            +optional
          type: string
        terminationMessagePath:
          description: |-
            Optional: Path at which the file to which the container's termination message
            will be written is mounted into the container's filesystem.
            Message written is intended to be brief final status, such as an assertion failure message.
            Will be truncated by the node if greater than 4096 bytes. The total message length across
            all containers will be limited to 12kb.
            Defaults to /dev/termination-log.
            Cannot be updated.
            +optional
          type: string
        terminationMessagePolicy:
          allOf:
          - $ref: "#/components/schemas/v1.TerminationMessagePolicy"
          description: |-
            Indicate how the termination message should be populated. File will use the contents of
            terminationMessagePath to populate the container status message on both success and failure.
            FallbackToLogsOnError will use the last chunk of container log output if the termination
            message file is empty and the container exited with an error.
            The log output is limited to 2048 bytes or 80 lines, whichever is smaller.
            Defaults to File.
            Cannot be updated.
            +optional
          type: object
        tty:
          description: |-
            Whether this container should allocate a TTY for itself, also requires 'stdin' to be true.
            Default is false.
            +optional
          type: boolean
        volumeDevices:
          description: |-
            volumeDevices is the list of block devices to be used by the container.
            +patchMergeKey=devicePath
            +patchStrategy=merge
            +listType=map
            +listMapKey=devicePath
            +optional
          items:
            $ref: "#/components/schemas/v1.VolumeDevice"
          type: array
        volumeMounts:
          description: |-
            Pod volumes to mount into the container's filesystem. Subpath mounts are not allowed for ephemeral containers.
            Cannot be updated.
            +optional
            +patchMergeKey=mountPath
            +patchStrategy=merge
            +listType=map
            +listMapKey=mountPath
          items:
            $ref: "#/components/schemas/v1.VolumeMount"
          type: array
        workingDir:
          description: |-
            Container's working directory.
            If not specified, the container runtime's default will be used, which
            might be configured in the container image.
            Cannot be updated.
            +optional
          type: string
      type: object
    v1.EphemeralVolumeSource:
      properties:
        volumeClaimTemplate:
          allOf:
          - $ref: "#/components/schemas/v1.PersistentVolumeClaimTemplate"
          description: |-
            Will be used to create a stand-alone PVC to provision the volume.
            The pod in which this EphemeralVolumeSource is embedded will be the
            owner of the PVC, i.e. the PVC will be deleted together with the
            pod.  The name of the PVC will be `<pod name>-<volume name>` where
            `<volume name>` is the name from the `PodSpec.Volumes` array
            entry. Pod validation will reject the pod if the concatenated name
            is not valid for a PVC (for example, too long).

            An existing PVC with that name that is not owned by the pod
            will *not* be used for the pod to avoid using an unrelated
            volume by mistake. Starting the pod is then blocked until
            the unrelated PVC is removed. If such a pre-created PVC is
            meant to be used by the pod, the PVC has to updated with an
            owner reference to the pod once the pod exists. Normally
            this should not be necessary, but it may be useful when
            manually reconstructing a broken cluster.

            This field is read-only and no changes will be made by Kubernetes
            to the PVC after it has been created.

            Required, must not be nil.
          type: object
      type: object
    v1.ExecAction:
      properties:
        command:
          description: |-
            Command is the command line to execute inside the container, the working directory for the
            command  is root ('/') in the container's filesystem. The command is simply exec'd, it is
            not run inside a shell, so traditional shell instructions ('|', etc) won't work. To use
            a shell, you need to explicitly call out to that shell.
            Exit status of 0 is treated as live/healthy and non-zero is unhealthy.
            +optional
            +listType=atomic
          items:
            type: string
          type: array
      type: object
    v1.FCVolumeSource:
      properties:
        fsType:
          description: |-
            fsType is the filesystem type to mount.
            Must be a filesystem type supported by the host operating system.
            Ex. "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
            TODO: how do we prevent errors in the filesystem from compromising the machine
            +optional
          type: string
        lun:
          description: |-
            lun is Optional: FC target lun number
            +optional
          type: integer
        readOnly:
          description: |-
            readOnly is Optional: Defaults to false (read/write). ReadOnly here will force
            the ReadOnly setting in VolumeMounts.
            +optional
          type: boolean
        targetWWNs:
          description: |-
            targetWWNs is Optional: FC target worldwide names (WWNs)
            +optional
            +listType=atomic
          items:
            type: string
          type: array
        wwids:
          description: |-
            wwids Optional: FC volume world wide identifiers (wwids)
            Either wwids or combination of targetWWNs and lun must be set, but not both simultaneously.
            +optional
            +listType=atomic
          items:
            type: string
          type: array
      type: object
    v1.FieldsV1:
      type: object
    v1.FileKeySelector:
      properties:
        key:
          description: |-
            The key within the env file. An invalid key will prevent the pod from starting.
            The keys defined within a source may consist of any printable ASCII characters except '='.
            During Alpha stage of the EnvFiles feature gate, the key size is limited to 128 characters.
            +required
          type: string
        optional:
          description: |-
            Specify whether the file or its key must be defined. If the file or key
            does not exist, then the env var is not published.
            If optional is set to true and the specified key does not exist,
            the environment variable will not be set in the Pod's containers.

            If optional is set to false and the specified key does not exist,
            an error will be returned during Pod creation.
            +optional
            +default=false
          type: boolean
        path:
          description: |-
            The path within the volume from which to select the file.
            Must be relative and may not contain the '..' path or start with '..'.
            +required
          type: string
        volumeName:
          description: |-
            The name of the volume mount containing the env file.
            +required
          type: string
      type: object
    v1.FlexVolumeSource:
      properties:
        driver:
          description: driver is the name of the driver to use for this volume.
          type: string
        fsType:
          description: |-
            fsType is the filesystem type to mount.
            Must be a filesystem type supported by the host operating system.
            Ex. "ext4", "xfs", "ntfs". The default filesystem depends on FlexVolume script.
            +optional
          type: string
        options:
          additionalProperties:
            type: string
          description: |-
            options is Optional: this field holds extra command options if any.
            +optional
          type: object
        readOnly:
          description: |-
            readOnly is Optional: defaults to false (read/write). ReadOnly here will force
            the ReadOnly setting in VolumeMounts.
            +optional
          type: boolean
        secretRef:
          allOf:
          - $ref: "#/components/schemas/v1.LocalObjectReference"
          description: |-
            secretRef is Optional: secretRef is reference to the secret object containing
            sensitive information to pass to the plugin scripts. This may be
            empty if no secret object is specified. If the secret object
            contains more than one secret, all secrets are passed to the plugin
            scripts.
            +optional
          type: object
      type: object
    v1.FlockerVolumeSource:
      properties:
        datasetName:
          description: |-
            datasetName is Name of the dataset stored as metadata -> name on the dataset for Flocker
            should be considered as deprecated
            +optional
          type: string
        datasetUUID:
          description: |-
            datasetUUID is the UUID of the dataset. This is unique identifier of a Flocker dataset
            +optional
          type: string
      type: object
    v1.GCEPersistentDiskVolumeSource:
      properties:
        fsType:
          description: |-
            fsType is filesystem type of the volume that you want to mount.
            Tip: Ensure that the filesystem type is supported by the host operating system.
            Examples: "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#gcepersistentdisk
            TODO: how do we prevent errors in the filesystem from compromising the machine
            +optional
          type: string
        partition:
          description: |-
            partition is the partition in the volume that you want to mount.
            If omitted, the default is to mount by volume name.
            Examples: For volume /dev/sda1, you specify the partition as "1".
            Similarly, the volume partition for /dev/sda is "0" (or you can leave the property empty).
            More info: https://kubernetes.io/docs/concepts/storage/volumes#gcepersistentdisk
            +optional
          type: integer
        pdName:
          description: |-
            pdName is unique name of the PD resource in GCE. Used to identify the disk in GCE.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#gcepersistentdisk
          type: string
        readOnly:
          description: |-
            readOnly here will force the ReadOnly setting in VolumeMounts.
            Defaults to false.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#gcepersistentdisk
            +optional
          type: boolean
      type: object
    v1.GRPCAction:
      properties:
        port:
          description: Port number of the gRPC service. Number must be in the range
            1 to 65535.
          type: integer
        service:
          description: |-
            Service is the name of the service to place in the gRPC HealthCheckRequest
            (see https://github.com/grpc/grpc/blob/master/doc/health-checking.md).

            If this is not specified, the default behavior is defined by gRPC.
            +optional
            +default=""
          type: string
      type: object
    v1.GitRepoVolumeSource:
      properties:
        directory:
          description: |-
            directory is the target directory name.
            Must not contain or start with '..'.  If '.' is supplied, the volume directory will be the
            git repository.  Otherwise, if specified, the volume will contain the git repository in
            the subdirectory with the given name.
            +optional
          type: string
        repository:
          description: repository is the URL
          type: string
        revision:
          description: |-
            revision is the commit hash for the specified revision.
            +optional
          type: string
      type: object
    v1.GlusterfsVolumeSource:
      properties:
        endpoints:
          description: endpoints is the endpoint name that details Glusterfs topology.
          type: string
        path:
          description: |-
            path is the Glusterfs volume path.
            More info: https://examples.k8s.io/volumes/glusterfs/README.md#create-a-pod
          type: string
        readOnly:
          description: |-
            readOnly here will force the Glusterfs volume to be mounted with read-only permissions.
            Defaults to false.
            More info: https://examples.k8s.io/volumes/glusterfs/README.md#create-a-pod
            +optional
          type: boolean
      type: object
    v1.HTTPGetAction:
      properties:
        host:
          description: |-
            Host name to connect to, defaults to the pod IP. You probably want to set
            "Host" in httpHeaders instead.
            +optional
          type: string
        httpHeaders:
          description: |-
            Custom headers to set in the request. HTTP allows repeated headers.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.HTTPHeader"
          type: array
        path:
          description: |-
            Path to access on the HTTP server.
            +optional
          type: string
        port:
          allOf:
          - $ref: "#/components/schemas/intstr.IntOrString"
          description: |-
            Name or number of the port to access on the container.
            Number must be in the range 1 to 65535.
            Name must be an IANA_SVC_NAME.
          type: object
        scheme:
          allOf:
          - $ref: "#/components/schemas/v1.URIScheme"
          description: |-
            Scheme to use for connecting to the host.
            Defaults to HTTP.
            +optional
          type: object
      type: object
    v1.HTTPHeader:
      properties:
        name:
          description: |-
            The header field name.
            This will be canonicalized upon output, so case-variant names will be understood as the same header.
          type: string
        value:
          description: The header field value
          type: string
      type: object
    v1.HostAlias:
      example:
        ip: ip
        hostnames:
        - hostnames
        - hostnames
      properties:
        hostnames:
          description: |-
            Hostnames for the above IP address.
            +listType=atomic
          items:
            type: string
          type: array
        ip:
          description: |-
            IP address of the host file entry.
            +required
          type: string
      type: object
    v1.HostPathType:
      enum:
      - ""
      - DirectoryOrCreate
      - Directory
      - FileOrCreate
      - File
      - Socket
      - CharDevice
      - BlockDevice
      type: string
      x-enum-varnames:
      - HostPathUnset
      - HostPathDirectoryOrCreate
      - HostPathDirectory
      - HostPathFileOrCreate
      - HostPathFile
      - HostPathSocket
      - HostPathCharDev
      - HostPathBlockDev
    v1.HostPathVolumeSource:
      properties:
        path:
          description: |-
            path of the directory on the host.
            If the path is a symlink, it will follow the link to the real path.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#hostpath
          type: string
        type:
          allOf:
          - $ref: "#/components/schemas/v1.HostPathType"
          description: |-
            type for HostPath Volume
            Defaults to ""
            More info: https://kubernetes.io/docs/concepts/storage/volumes#hostpath
            +optional
          type: object
      type: object
    v1.ISCSIVolumeSource:
      properties:
        chapAuthDiscovery:
          description: |-
            chapAuthDiscovery defines whether support iSCSI Discovery CHAP authentication
            +optional
          type: boolean
        chapAuthSession:
          description: |-
            chapAuthSession defines whether support iSCSI Session CHAP authentication
            +optional
          type: boolean
        fsType:
          description: |-
            fsType is the filesystem type of the volume that you want to mount.
            Tip: Ensure that the filesystem type is supported by the host operating system.
            Examples: "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#iscsi
            TODO: how do we prevent errors in the filesystem from compromising the machine
            +optional
          type: string
        initiatorName:
          description: |-
            initiatorName is the custom iSCSI Initiator Name.
            If initiatorName is specified with iscsiInterface simultaneously, new iSCSI interface
            <target portal>:<volume name> will be created for the connection.
            +optional
          type: string
        iqn:
          description: iqn is the target iSCSI Qualified Name.
          type: string
        iscsiInterface:
          description: |-
            iscsiInterface is the interface Name that uses an iSCSI transport.
            Defaults to 'default' (tcp).
            +optional
            +default="default"
          type: string
        lun:
          description: lun represents iSCSI Target Lun number.
          type: integer
        portals:
          description: |-
            portals is the iSCSI Target Portal List. The portal is either an IP or ip_addr:port if the port
            is other than default (typically TCP ports 860 and 3260).
            +optional
            +listType=atomic
          items:
            type: string
          type: array
        readOnly:
          description: |-
            readOnly here will force the ReadOnly setting in VolumeMounts.
            Defaults to false.
            +optional
