apiVersion: v1
kind: Service
metadata:
  name: komputer-api
spec:
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: komputer-api
subsets:
  - addresses:
      - ip: 192.168.65.254   # Docker Desktop host IP
    ports:
      - port: 8080
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
type: Opaque
stringData:
  password: ""
