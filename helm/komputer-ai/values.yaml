# komputer.ai Helm chart values

# -- Image pull secrets for private registries (e.g. GHCR private repos).
# Create the secret first: kubectl create secret docker-registry ghcr-pull-secret --docker-server=ghcr.io --docker-username=<user> --docker-password=<pat> -n komputer-ai
imagePullSecrets: []
# imagePullSecrets:
#   - name: ghcr-pull-secret

operator:
  image:
    repository: ghcr.io/kontroloop-ai/komputer-operator
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  # -- Enable leader election for the operator. Required when replicas > 1 (HA mode).
  leaderElect: true
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

api:
  image:
    repository: ghcr.io/kontroloop-ai/komputer-api
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi
  ingress:
    enabled: false
    # -- Ingress class name (e.g. nginx, traefik, alb)
    className: ""
    annotations: {}
    # Example annotations:
    #   nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    #   nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    #   cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: komputer.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
    # - secretName: komputer-tls
    #   hosts:
    #     - komputer.example.com

ui:
  enabled: true
  image:
    repository: ghcr.io/kontroloop-ai/komputer-ui
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  # -- API URL the UI connects to (runs in the browser, not in-cluster).
  # Default: http://localhost:8080 (for port-forward access).
  # Set to the API ingress URL for production (e.g. https://api.komputer.example.com).
  apiUrl: ""
  service:
    type: ClusterIP
    port: 3000
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: komputer-ui.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

agent:
  image:
    repository: ghcr.io/kontroloop-ai/komputer-agent
    tag: latest
    pullPolicy: IfNotPresent
  # -- Default Claude model for new agents
  defaultModel: claude-sonnet-4-6
  # -- Service account for agent pods (e.g. for kubectl access inside agents)
  serviceAccount:
    # -- Set to true to create a ServiceAccount, Role, and RoleBinding for agent pods
    create: false
    # -- RBAC rules granted to the agent service account.
    # Only used when serviceAccount.create is true.
    rules: []
    # Example — give agents read-only access to pods and deployments:
    # rules:
    #   - apiGroups: [""]
    #     resources: ["pods", "pods/log"]
    #     verbs: ["get", "list", "watch"]
    #   - apiGroups: ["apps"]
    #     resources: ["deployments"]
    #     verbs: ["get", "list", "watch"]

# -- Built-in single-node Redis. Set enabled=false to use an external Redis.
# For HA Redis, disable this and set redis-ha.enabled=true (dandydeveloper/redis-ha subchart).
redis:
  enabled: true
  image: redis:7-alpine
  resources:
    limits:
      cpu: 250m
      memory: 128Mi

# -- Redis HA subchart (dandydeveloper/redis-ha). Disabled by default.
# Enable for production HA deployments. Disable redis.enabled when using this.
redis-ha:
  enabled: false
  haproxy:
    enabled: true
  image:
    repository: redis
    tag: 7-alpine
  auth: false

# -- External Redis settings (only used when redis.enabled=false)
externalRedis:
  address: ""
  passwordSecret:
    name: ""
    key: password

# -- Anthropic API key secret reference (REQUIRED when not using Bedrock)
# Create it first: kubectl create secret generic anthropic-api-key --from-literal=api-key=sk-ant-...
anthropicApiKeySecret:
  name: ""
  key: api-key

# -- AWS Bedrock configuration. When enabled, agents use Bedrock instead of the Anthropic API.
# Auth: use IRSA on EKS (recommended) or provide AWS credentials via a secret.
bedrock:
  enabled: false
  region: "us-east-1"

# -- KomputerConfig settings
config:
  # -- Default namespace for agents when not specified by the user (default: "default")
  defaultAgentNamespace: "default"
  # -- Override the API URL (auto-generated from release name if empty)
  apiURL: ""
  redis:
    # -- Redis stream prefix for agent events
    streamPrefix: komputer-events
    db: 0

# -- Default skills shipped with the chart (memory-creation, skill-creation).
# These are auto-attached to every agent via the komputer.ai/default label.
defaultSkills:
  enabled: true

# -- Default KomputerAgentClusterTemplate settings
clusterTemplate:
  # -- PVC storage size for agent workspaces
  storageSize: 5Gi
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
