apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-operator
  labels:
    {{- include "komputer.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - pods
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
- apiGroups:
  - ""
  resources:
  - pods/ephemeralcontainers
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeragents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeragents/finalizers
  verbs:
  - update
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeragents/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeroffices
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeroffices/finalizers
  verbs:
  - update
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeroffices/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputerschedules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputerschedules/finalizers
  verbs:
  - update
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputerschedules/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputersquads
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputersquads/finalizers
  verbs:
  - update
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputersquads/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeragentclustertemplates
  - komputeragenttemplates
  - komputerconfigs
  - komputermemories
  - komputerskills
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputermemories/status
  - komputerskills/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-operator
  labels:
    {{- include "komputer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-operator
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-operator
  namespace: {{ .Release.Namespace }}
---
# Leader election Role (namespace-scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-operator-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "komputer.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-operator-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "komputer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-operator-leader-election
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-operator
  namespace: {{ .Release.Namespace }}
