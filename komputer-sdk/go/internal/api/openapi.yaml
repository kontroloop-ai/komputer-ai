          description: Path of the field to select in the specified API version.
          type: string
      type: object
    v1.ObjectMeta:
      properties:
        annotations:
          additionalProperties:
            type: string
          description: |-
            Annotations is an unstructured key value map stored with a resource that may be
            set by external tools to store and retrieve arbitrary metadata. They are not
            queryable and should be preserved when modifying objects.
            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations
            +optional
          type: object
        creationTimestamp:
          description: |-
            CreationTimestamp is a timestamp representing the server time when this object was
            created. It is not guaranteed to be set in happens-before order across separate operations.
            Clients may not set this value. It is represented in RFC3339 form and is in UTC.

            Populated by the system.
            Read-only.
            Null for lists.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#metadata
            +optional
          type: string
        deletionGracePeriodSeconds:
          description: |-
            Number of seconds allowed for this object to gracefully terminate before
            it will be removed from the system. Only set when deletionTimestamp is also set.
            May only be shortened.
            Read-only.
            +optional
          type: integer
        deletionTimestamp:
          description: |-
            DeletionTimestamp is RFC 3339 date and time at which this resource will be deleted. This
            field is set by the server when a graceful deletion is requested by the user, and is not
            directly settable by a client. The resource is expected to be deleted (no longer visible
            from resource lists, and not reachable by name) after the time in this field, once the
            finalizers list is empty. As long as the finalizers list contains items, deletion is blocked.
            Once the deletionTimestamp is set, this value may not be unset or be set further into the
            future, although it may be shortened or the resource may be deleted prior to this time.
            For example, a user may request that a pod is deleted in 30 seconds. The Kubelet will react
            by sending a graceful termination signal to the containers in the pod. After that 30 seconds,
            the Kubelet will send a hard termination signal (SIGKILL) to the container and after cleanup,
            remove the pod from the API. In the presence of network partitions, this object may still
            exist after this timestamp, until an administrator or automated process can determine the
            resource is fully terminated.
            If not set, graceful deletion of the object has not been requested.

            Populated by the system when a graceful deletion is requested.
            Read-only.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#metadata
            +optional
          type: string
        finalizers:
          description: |-
            Must be empty before the object is deleted from the registry. Each entry
            is an identifier for the responsible component that will remove the entry
            from the list. If the deletionTimestamp of the object is non-nil, entries
            in this list can only be removed.
            Finalizers may be processed and removed in any order.  Order is NOT enforced
            because it introduces significant risk of stuck finalizers.
            finalizers is a shared field, any actor with permission can reorder it.
            If the finalizer list is processed in order, then this can lead to a situation
            in which the component responsible for the first finalizer in the list is
            waiting for a signal (field value, external system, or other) produced by a
            component responsible for a finalizer later in the list, resulting in a deadlock.
            Without enforced ordering finalizers are free to order amongst themselves and
            are not vulnerable to ordering changes in the list.
            +optional
            +patchStrategy=merge
            +listType=set
          items:
            type: string
          type: array
        generateName:
          description: |-
            GenerateName is an optional prefix, used by the server, to generate a unique
            name ONLY IF the Name field has not been provided.
            If this field is used, the name returned to the client will be different
            than the name passed. This value will also be combined with a unique suffix.
            The provided value has the same validation rules as the Name field,
            and may be truncated by the length of the suffix required to make the value
            unique on the server.

            If this field is specified and the generated name exists, the server will return a 409.

            Applied only if Name is not specified.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#idempotency
            +optional
          type: string
        generation:
          description: |-
            A sequence number representing a specific generation of the desired state.
            Populated by the system. Read-only.
            +optional
          type: integer
        labels:
          additionalProperties:
            type: string
          description: |-
            Map of string keys and values that can be used to organize and categorize
            (scope and select) objects. May match selectors of replication controllers
            and services.
            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels
            +optional
          type: object
        managedFields:
          description: |-
            ManagedFields maps workflow-id and version to the set of fields
            that are managed by that workflow. This is mostly for internal
            housekeeping, and users typically shouldn't need to set or
            understand this field. A workflow can be the user's name, a
            controller's name, or the name of a specific apply path like
            "ci-cd". The set of fields is always in the version that the
            workflow used when modifying the object.

            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.ManagedFieldsEntry"
          type: array
        name:
          description: |-
            Name must be unique within a namespace. Is required when creating resources, although
            some resources may allow a client to request the generation of an appropriate name
            automatically. Name is primarily intended for creation idempotence and configuration
            definition.
            Cannot be updated.
            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#names
            +optional
          type: string
        namespace:
          description: |-
            Namespace defines the space within which each name must be unique. An empty namespace is
            equivalent to the "default" namespace, but "default" is the canonical representation.
            Not all objects are required to be scoped to a namespace - the value of this field for
            those objects will be empty.

            Must be a DNS_LABEL.
            Cannot be updated.
            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces
            +optional
          type: string
        ownerReferences:
          description: |-
            List of objects depended by this object. If ALL objects in the list have
            been deleted, this object will be garbage collected. If this object is managed by a controller,
            then an entry in this list will point to this controller, with the controller field set to true.
            There cannot be more than one managing controller.
            +optional
            +patchMergeKey=uid
            +patchStrategy=merge
            +listType=map
            +listMapKey=uid
          items:
            $ref: "#/components/schemas/v1.OwnerReference"
          type: array
        resourceVersion:
          description: |-
            An opaque value that represents the internal version of this object that can
            be used by clients to determine when objects have changed. May be used for optimistic
            concurrency, change detection, and the watch operation on a resource or set of resources.
            Clients must treat these values as opaque and passed unmodified back to the server.
            They may only be valid for a particular resource or set of resources.

            Populated by the system.
            Read-only.
            Value must be treated as opaque by clients and .
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
            +optional
          type: string
        selfLink:
          description: |-
            Deprecated: selfLink is a legacy read-only field that is no longer populated by the system.
            +optional
          type: string
        uid:
          description: |-
            UID is the unique in time and space value for this object. It is typically generated by
            the server on successful creation of a resource and is not allowed to change on PUT
            operations.

            Populated by the system.
            Read-only.
            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#uids
            +optional
          type: string
      type: object
    v1.OwnerReference:
      properties:
        apiVersion:
          description: API version of the referent.
          type: string
        blockOwnerDeletion:
          description: |-
            If true, AND if the owner has the "foregroundDeletion" finalizer, then
            the owner cannot be deleted from the key-value store until this
            reference is removed.
            See https://kubernetes.io/docs/concepts/architecture/garbage-collection/#foreground-deletion
            for how the garbage collector interacts with this field and enforces the foreground deletion.
            Defaults to false.
            To set this field, a user needs "delete" permission of the owner,
            otherwise 422 (Unprocessable Entity) will be returned.
            +optional
          type: boolean
        controller:
          description: |-
            If true, this reference points to the managing controller.
            +optional
          type: boolean
        kind:
          description: |-
            Kind of the referent.
            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
          type: string
        name:
          description: |-
            Name of the referent.
            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#names
          type: string
        uid:
          description: |-
            UID of the referent.
            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names#uids
          type: string
      type: object
    v1.PersistentVolumeAccessMode:
      enum:
      - ReadWriteOnce
      - ReadOnlyMany
      - ReadWriteMany
      - ReadWriteOncePod
      type: string
      x-enum-varnames:
      - ReadWriteOnce
      - ReadOnlyMany
      - ReadWriteMany
      - ReadWriteOncePod
    v1.PersistentVolumeClaimSpec:
      properties:
        accessModes:
          description: |-
            accessModes contains the desired access modes the volume should have.
            More info: https://kubernetes.io/docs/concepts/storage/persistent-volumes#access-modes-1
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.PersistentVolumeAccessMode"
          type: array
        dataSource:
          allOf:
          - $ref: "#/components/schemas/v1.TypedLocalObjectReference"
          description: |-
            dataSource field can be used to specify either:
            * An existing VolumeSnapshot object (snapshot.storage.k8s.io/VolumeSnapshot)
            * An existing PVC (PersistentVolumeClaim)
            If the provisioner or an external controller can support the specified data source,
            it will create a new volume based on the contents of the specified data source.
            When the AnyVolumeDataSource feature gate is enabled, dataSource contents will be copied to dataSourceRef,
            and dataSourceRef contents will be copied to dataSource when dataSourceRef.namespace is not specified.
            If the namespace is specified, then dataSourceRef will not be copied to dataSource.
            +optional
          type: object
        dataSourceRef:
          allOf:
          - $ref: "#/components/schemas/v1.TypedObjectReference"
          description: |-
            dataSourceRef specifies the object from which to populate the volume with data, if a non-empty
            volume is desired. This may be any object from a non-empty API group (non
            core object) or a PersistentVolumeClaim object.
            When this field is specified, volume binding will only succeed if the type of
            the specified object matches some installed volume populator or dynamic
            provisioner.
            This field will replace the functionality of the dataSource field and as such
            if both fields are non-empty, they must have the same value. For backwards
            compatibility, when namespace isn't specified in dataSourceRef,
            both fields (dataSource and dataSourceRef) will be set to the same
            value automatically if one of them is empty and the other is non-empty.
            When namespace is specified in dataSourceRef,
            dataSource isn't set to the same value and must be empty.
            There are three important differences between dataSource and dataSourceRef:
            * While dataSource only allows two specific types of objects, dataSourceRef
              allows any non-core object, as well as PersistentVolumeClaim objects.
            * While dataSource ignores disallowed values (dropping them), dataSourceRef
              preserves all values, and generates an error if a disallowed value is
              specified.
            * While dataSource only allows local objects, dataSourceRef allows objects
              in any namespaces.
            (Beta) Using this field requires the AnyVolumeDataSource feature gate to be enabled.
            (Alpha) Using the namespace field of dataSourceRef requires the CrossNamespaceVolumeDataSource feature gate to be enabled.
            +optional
          type: object
        resources:
          allOf:
          - $ref: "#/components/schemas/v1.VolumeResourceRequirements"
          description: |-
            resources represents the minimum resources the volume should have.
            Users are allowed to specify resource requirements
            that are lower than previous value but must still be higher than capacity recorded in the
            status field of the claim.
            More info: https://kubernetes.io/docs/concepts/storage/persistent-volumes#resources
            +optional
          type: object
        selector:
          allOf:
          - $ref: "#/components/schemas/v1.LabelSelector"
          description: |-
            selector is a label query over volumes to consider for binding.
            +optional
          type: object
        storageClassName:
          description: |-
            storageClassName is the name of the StorageClass required by the claim.
            More info: https://kubernetes.io/docs/concepts/storage/persistent-volumes#class-1
            +optional
          type: string
        volumeAttributesClassName:
          description: |-
            volumeAttributesClassName may be used to set the VolumeAttributesClass used by this claim.
            If specified, the CSI driver will create or update the volume with the attributes defined
            in the corresponding VolumeAttributesClass. This has a different purpose than storageClassName,
            it can be changed after the claim is created. An empty string or nil value indicates that no
            VolumeAttributesClass will be applied to the claim. If the claim enters an Infeasible error state,
            this field can be reset to its previous value (including nil) to cancel the modification.
            If the resource referred to by volumeAttributesClass does not exist, this PersistentVolumeClaim will be
            set to a Pending state, as reflected by the modifyVolumeStatus field, until such as a resource
            exists.
            More info: https://kubernetes.io/docs/concepts/storage/volume-attributes-classes/
            +featureGate=VolumeAttributesClass
            +optional
          type: string
        volumeMode:
          allOf:
          - $ref: "#/components/schemas/v1.PersistentVolumeMode"
          description: |-
            volumeMode defines what type of volume is required by the claim.
            Value of Filesystem is implied when not included in claim spec.
            +optional
          type: object
        volumeName:
          description: |-
            volumeName is the binding reference to the PersistentVolume backing this claim.
            +optional
          type: string
      type: object
    v1.PersistentVolumeClaimTemplate:
      properties:
        metadata:
          allOf:
          - $ref: "#/components/schemas/v1.ObjectMeta"
          description: |-
            May contain labels and annotations that will be copied into the PVC
            when creating it. No other fields are allowed and will be rejected during
            validation.

            +optional
          type: object
        spec:
          allOf:
          - $ref: "#/components/schemas/v1.PersistentVolumeClaimSpec"
          description: |-
            The specification for the PersistentVolumeClaim. The entire content is
            copied unchanged into the PVC that gets created from this
            template. The same fields as in a PersistentVolumeClaim
            are also valid here.
          type: object
      type: object
    v1.PersistentVolumeClaimVolumeSource:
      properties:
        claimName:
          description: |-
            claimName is the name of a PersistentVolumeClaim in the same namespace as the pod using this volume.
            More info: https://kubernetes.io/docs/concepts/storage/persistent-volumes#persistentvolumeclaims
          type: string
        readOnly:
          description: |-
            readOnly Will force the ReadOnly setting in VolumeMounts.
            Default false.
            +optional
          type: boolean
      type: object
    v1.PersistentVolumeMode:
      enum:
      - Block
      - Filesystem
      type: string
      x-enum-varnames:
      - PersistentVolumeBlock
      - PersistentVolumeFilesystem
    v1.PhotonPersistentDiskVolumeSource:
      properties:
        fsType:
          description: |-
            fsType is the filesystem type to mount.
            Must be a filesystem type supported by the host operating system.
            Ex. "ext4", "xfs", "ntfs". Implicitly inferred to be "ext4" if unspecified.
          type: string
        pdID:
          description: pdID is the ID that identifies Photon Controller persistent
            disk
          type: string
      type: object
    v1.PodAffinity:
      properties:
        preferredDuringSchedulingIgnoredDuringExecution:
          description: |-
            The scheduler will prefer to schedule pods to nodes that satisfy
            the affinity expressions specified by this field, but it may choose
            a node that violates one or more of the expressions. The node that is
            most preferred is the one with the greatest sum of weights, i.e.
            for each node that meets all of the scheduling requirements (resource
            request, requiredDuringScheduling affinity expressions, etc.),
            compute a sum by iterating through the elements of this field and adding
            "weight" to the sum if the node has pods which matches the corresponding podAffinityTerm; the
            node(s) with the highest sum are the most preferred.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.WeightedPodAffinityTerm"
          type: array
        requiredDuringSchedulingIgnoredDuringExecution:
          description: |-
            If the affinity requirements specified by this field are not met at
            scheduling time, the pod will not be scheduled onto the node.
            If the affinity requirements specified by this field cease to be met
            at some point during pod execution (e.g. due to a pod label update), the
            system may or may not try to eventually evict the pod from its node.
            When there are multiple elements, the lists of nodes corresponding to each
            podAffinityTerm are intersected, i.e. all terms must be satisfied.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.PodAffinityTerm"
          type: array
      type: object
    v1.PodAffinityTerm:
      properties:
        labelSelector:
          allOf:
          - $ref: "#/components/schemas/v1.LabelSelector"
          description: |-
            A label query over a set of resources, in this case pods.
            If it's null, this PodAffinityTerm matches with no Pods.
            +optional
          type: object
        matchLabelKeys:
          description: |-
            MatchLabelKeys is a set of pod label keys to select which pods will
            be taken into consideration. The keys are used to lookup values from the
            incoming pod labels, those key-value labels are merged with `labelSelector` as `key in (value)`
            to select the group of existing pods which pods will be taken into consideration
            for the incoming pod's pod (anti) affinity. Keys that don't exist in the incoming
            pod labels will be ignored. The default value is empty.
            The same key is forbidden to exist in both matchLabelKeys and labelSelector.
            Also, matchLabelKeys cannot be set when labelSelector isn't set.

            +listType=atomic
            +optional
          items:
            type: string
          type: array
        mismatchLabelKeys:
          description: |-
            MismatchLabelKeys is a set of pod label keys to select which pods will
            be taken into consideration. The keys are used to lookup values from the
            incoming pod labels, those key-value labels are merged with `labelSelector` as `key notin (value)`
            to select the group of existing pods which pods will be taken into consideration
            for the incoming pod's pod (anti) affinity. Keys that don't exist in the incoming
            pod labels will be ignored. The default value is empty.
            The same key is forbidden to exist in both mismatchLabelKeys and labelSelector.
            Also, mismatchLabelKeys cannot be set when labelSelector isn't set.

            +listType=atomic
            +optional
          items:
            type: string
          type: array
        namespaceSelector:
          allOf:
          - $ref: "#/components/schemas/v1.LabelSelector"
          description: |-
            A label query over the set of namespaces that the term applies to.
            The term is applied to the union of the namespaces selected by this field
            and the ones listed in the namespaces field.
            null selector and null or empty namespaces list means "this pod's namespace".
            An empty selector ({}) matches all namespaces.
            +optional
          type: object
        namespaces:
          description: |-
            namespaces specifies a static list of namespace names that the term applies to.
            The term is applied to the union of the namespaces listed in this field
            and the ones selected by namespaceSelector.
            null or empty namespaces list and null namespaceSelector means "this pod's namespace".
            +optional
            +listType=atomic
          items:
            type: string
          type: array
        topologyKey:
          description: |-
            This pod should be co-located (affinity) or not co-located (anti-affinity) with the pods matching
            the labelSelector in the specified namespaces, where co-located is defined as running on a node
            whose value of the label with key topologyKey matches that of any node on which any of the
            selected pods is running.
            Empty topologyKey is not allowed.
          type: string
      type: object
    v1.PodAntiAffinity:
      properties:
        preferredDuringSchedulingIgnoredDuringExecution:
          description: |-
            The scheduler will prefer to schedule pods to nodes that satisfy
            the anti-affinity expressions specified by this field, but it may choose
            a node that violates one or more of the expressions. The node that is
            most preferred is the one with the greatest sum of weights, i.e.
            for each node that meets all of the scheduling requirements (resource
            request, requiredDuringScheduling anti-affinity expressions, etc.),
            compute a sum by iterating through the elements of this field and subtracting
            "weight" from the sum if the node has pods which matches the corresponding podAffinityTerm; the
            node(s) with the highest sum are the most preferred.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.WeightedPodAffinityTerm"
          type: array
        requiredDuringSchedulingIgnoredDuringExecution:
          description: |-
            If the anti-affinity requirements specified by this field are not met at
            scheduling time, the pod will not be scheduled onto the node.
            If the anti-affinity requirements specified by this field cease to be met
            at some point during pod execution (e.g. due to a pod label update), the
            system may or may not try to eventually evict the pod from its node.
            When there are multiple elements, the lists of nodes corresponding to each
            podAffinityTerm are intersected, i.e. all terms must be satisfied.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.PodAffinityTerm"
          type: array
      type: object
    v1.PodCertificateProjection:
      properties:
        certificateChainPath:
          description: |-
            Write the certificate chain at this path in the projected volume.

            Most applications should use credentialBundlePath.  When using keyPath
            and certificateChainPath, your application needs to check that the key
            and leaf certificate are consistent, because it is possible to read the
            files mid-rotation.

            +optional
          type: string
        credentialBundlePath:
          description: |-
            Write the credential bundle at this path in the projected volume.

            The credential bundle is a single file that contains multiple PEM blocks.
            The first PEM block is a PRIVATE KEY block, containing a PKCS#8 private
            key.

            The remaining blocks are CERTIFICATE blocks, containing the issued
            certificate chain from the signer (leaf and any intermediates).

            Using credentialBundlePath lets your Pod's application code make a single
            atomic read that retrieves a consistent key and certificate chain.  If you
            project them to separate files, your application code will need to
            additionally check that the leaf certificate was issued to the key.

            +optional
          type: string
        keyPath:
          description: |-
            Write the key at this path in the projected volume.

            Most applications should use credentialBundlePath.  When using keyPath
            and certificateChainPath, your application needs to check that the key
            and leaf certificate are consistent, because it is possible to read the
            files mid-rotation.

            +optional
          type: string
        keyType:
          description: |-
            The type of keypair Kubelet will generate for the pod.

            Valid values are "RSA3072", "RSA4096", "ECDSAP256", "ECDSAP384",
            "ECDSAP521", and "ED25519".

            +required
          type: string
        maxExpirationSeconds:
          description: |-
            maxExpirationSeconds is the maximum lifetime permitted for the
            certificate.

            Kubelet copies this value verbatim into the PodCertificateRequests it
            generates for this projection.

            If omitted, kube-apiserver will set it to 86400(24 hours). kube-apiserver
            will reject values shorter than 3600 (1 hour).  The maximum allowable
            value is 7862400 (91 days).

            The signer implementation is then free to issue a certificate with any
            lifetime *shorter* than MaxExpirationSeconds, but no shorter than 3600
            seconds (1 hour).  This constraint is enforced by kube-apiserver.
            `kubernetes.io` signers will never issue certificates with a lifetime
            longer than 24 hours.

            +optional
          type: integer
        signerName:
          description: |-
            Kubelet's generated CSRs will be addressed to this signer.

            +required
          type: string
        userAnnotations:
          additionalProperties:
            type: string
          description: |-
            userAnnotations allow pod authors to pass additional information to
            the signer implementation.  Kubernetes does not restrict or validate this
            metadata in any way.

            These values are copied verbatim into the `spec.unverifiedUserAnnotations` field of
            the PodCertificateRequest objects that Kubelet creates.

            Entries are subject to the same validation as object metadata annotations,
            with the addition that all keys must be domain-prefixed. No restrictions
            are placed on values, except an overall size limitation on the entire field.

            Signers should document the keys and values they support. Signers should
            deny requests that contain keys they do not recognize.
          type: object
      type: object
    v1.PodConditionType:
      enum:
      - ContainersReady
      - Initialized
      - Ready
      - PodScheduled
      - DisruptionTarget
      - PodReadyToStartContainers
      - PodResizePending
      - PodResizeInProgress
      - AllContainersRestarting
      type: string
      x-enum-varnames:
      - ContainersReady
      - PodInitialized
      - PodReady
      - PodScheduled
      - DisruptionTarget
      - PodReadyToStartContainers
      - PodResizePending
      - PodResizeInProgress
      - AllContainersRestarting
    v1.PodDNSConfig:
      properties:
        nameservers:
          description: |-
            A list of DNS name server IP addresses.
            This will be appended to the base nameservers generated from DNSPolicy.
            Duplicated nameservers will be removed.
            +optional
            +listType=atomic
          items:
            type: string
          type: array
        options:
          description: |-
            A list of DNS resolver options.
            This will be merged with the base options generated from DNSPolicy.
            Duplicated entries will be removed. Resolution options given in Options
            will override those that appear in the base DNSPolicy.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.PodDNSConfigOption"
          type: array
        searches:
          description: |-
            A list of DNS search domains for host-name lookup.
            This will be appended to the base search paths generated from DNSPolicy.
            Duplicated search paths will be removed.
            +optional
            +listType=atomic
          items:
            type: string
          type: array
      type: object
    v1.PodDNSConfigOption:
      properties:
        name:
          description: |-
            Name is this DNS resolver option's name.
            Required.
          type: string
        value:
          description: |-
            Value is this DNS resolver option's value.
            +optional
          type: string
      type: object
    v1.PodFSGroupChangePolicy:
      enum:
      - OnRootMismatch
      - Always
      type: string
      x-enum-varnames:
      - FSGroupChangeOnRootMismatch
      - FSGroupChangeAlways
    v1.PodOS:
      properties:
        name:
          allOf:
          - $ref: "#/components/schemas/v1.OSName"
          description: |-
            Name is the name of the operating system. The currently supported values are linux and windows.
            Additional value may be defined in future and can be one of:
            https://github.com/opencontainers/runtime-spec/blob/master/config.md#platform-specific-configuration
            Clients should expect to handle additional values and treat unrecognized values in this field as os: null
          type: object
      type: object
    v1.PodReadinessGate:
      example:
        conditionType: "{}"
      properties:
        conditionType:
          allOf:
          - $ref: "#/components/schemas/v1.PodConditionType"
          description: ConditionType refers to a condition in the pod's condition
            list with matching type.
          type: object
      type: object
    v1.PodResourceClaim:
      example:
        resourceClaimName: resourceClaimName
        name: name
        resourceClaimTemplateName: resourceClaimTemplateName
      properties:
        name:
          description: |-
            Name uniquely identifies this resource claim inside the pod.
            This must be a DNS_LABEL.
          type: string
        resourceClaimName:
          description: |-
            ResourceClaimName is the name of a ResourceClaim object in the same
            namespace as this pod.

            Exactly one of ResourceClaimName and ResourceClaimTemplateName must
            be set.
          type: string
        resourceClaimTemplateName:
          description: |-
            ResourceClaimTemplateName is the name of a ResourceClaimTemplate
            object in the same namespace as this pod.

            The template will be used to create a new ResourceClaim, which will
            be bound to this pod. When this pod is deleted, the ResourceClaim
            will also be deleted. The pod name and resource name, along with a
            generated component, will be used to form a unique name for the
            ResourceClaim, which will be recorded in pod.status.resourceClaimStatuses.

            This field is immutable and no changes will be made to the
            corresponding ResourceClaim by the control plane after creating the
            ResourceClaim.

            Exactly one of ResourceClaimName and ResourceClaimTemplateName must
            be set.
          type: string
      type: object
    v1.PodSELinuxChangePolicy:
      enum:
      - Recursive
      - MountOption
      type: string
      x-enum-varnames:
      - SELinuxChangePolicyRecursive
      - SELinuxChangePolicyMountOption
    v1.PodSchedulingGate:
      example:
        name: name
      properties:
        name:
          description: |-
            Name of the scheduling gate.
            Each scheduling gate must have a unique name field.
          type: string
      type: object
    v1.PodSecurityContext:
      properties:
        appArmorProfile:
          allOf:
          - $ref: "#/components/schemas/v1.AppArmorProfile"
          description: |-
            appArmorProfile is the AppArmor options to use by the containers in this pod.
            Note that this field cannot be set when spec.os.name is windows.
            +optional
          type: object
        fsGroup:
          description: |-
            A special supplemental group that applies to all containers in a pod.
            Some volume types allow the Kubelet to change the ownership of that volume
            to be owned by the pod:

            1. The owning GID will be the FSGroup
            2. The setgid bit is set (new files created in the volume will be owned by FSGroup)
            3. The permission bits are OR'd with rw-rw----

            If unset, the Kubelet will not modify the ownership and permissions of any volume.
            Note that this field cannot be set when spec.os.name is windows.
            +optional
          type: integer
        fsGroupChangePolicy:
          allOf:
          - $ref: "#/components/schemas/v1.PodFSGroupChangePolicy"
          description: |-
            fsGroupChangePolicy defines behavior of changing ownership and permission of the volume
            before being exposed inside Pod. This field will only apply to
            volume types which support fsGroup based ownership(and permissions).
            It will have no effect on ephemeral volume types such as: secret, configmaps
            and emptydir.
            Valid values are "OnRootMismatch" and "Always". If not specified, "Always" is used.
            Note that this field cannot be set when spec.os.name is windows.
            +optional
          type: object
        runAsGroup:
          description: |-
            The GID to run the entrypoint of the container process.
            Uses runtime default if unset.
            May also be set in SecurityContext.  If set in both SecurityContext and
            PodSecurityContext, the value specified in SecurityContext takes precedence
            for that container.
            Note that this field cannot be set when spec.os.name is windows.
            +optional
          type: integer
        runAsNonRoot:
          description: |-
            Indicates that the container must run as a non-root user.
            If true, the Kubelet will validate the image at runtime to ensure that it
            does not run as UID 0 (root) and fail to start the container if it does.
            If unset or false, no such validation will be performed.
            May also be set in SecurityContext.  If set in both SecurityContext and
            PodSecurityContext, the value specified in SecurityContext takes precedence.
            +optional
          type: boolean
        runAsUser:
          description: |-
            The UID to run the entrypoint of the container process.
            Defaults to user specified in image metadata if unspecified.
            May also be set in SecurityContext.  If set in both SecurityContext and
            PodSecurityContext, the value specified in SecurityContext takes precedence
            for that container.
            Note that this field cannot be set when spec.os.name is windows.
            +optional
          type: integer
        seLinuxChangePolicy:
          allOf:
          - $ref: "#/components/schemas/v1.PodSELinuxChangePolicy"
          description: |-
            seLinuxChangePolicy defines how the container's SELinux label is applied to all volumes used by the Pod.
            It has no effect on nodes that do not support SELinux or to volumes does not support SELinux.
            Valid values are "MountOption" and "Recursive".

            "Recursive" means relabeling of all files on all Pod volumes by the container runtime.
            This may be slow for large volumes, but allows mixing privileged and unprivileged Pods sharing the same volume on the same node.

            "MountOption" mounts all eligible Pod volumes with `-o context` mount option.
            This requires all Pods that share the same volume to use the same SELinux label.
            It is not possible to share the same volume among privileged and unprivileged Pods.
            Eligible volumes are in-tree FibreChannel and iSCSI volumes, and all CSI volumes
            whose CSI driver announces SELinux support by setting spec.seLinuxMount: true in their
            CSIDriver instance. Other volumes are always re-labelled recursively.
            "MountOption" value is allowed only when SELinuxMount feature gate is enabled.

            If not specified and SELinuxMount feature gate is enabled, "MountOption" is used.
            If not specified and SELinuxMount feature gate is disabled, "MountOption" is used for ReadWriteOncePod volumes
            and "Recursive" for all other volumes.

            This field affects only Pods that have SELinux label set, either in PodSecurityContext or in SecurityContext of all containers.

            All Pods that use the same volume should use the same seLinuxChangePolicy, otherwise some pods can get stuck in ContainerCreating state.
            Note that this field cannot be set when spec.os.name is windows.
            +featureGate=SELinuxChangePolicy
            +optional
          type: object
        seLinuxOptions:
          allOf:
          - $ref: "#/components/schemas/v1.SELinuxOptions"
          description: |-
            The SELinux context to be applied to all containers.
            If unspecified, the container runtime will allocate a random SELinux context for each
            container.  May also be set in SecurityContext.  If set in
            both SecurityContext and PodSecurityContext, the value specified in SecurityContext
            takes precedence for that container.
            Note that this field cannot be set when spec.os.name is windows.
            +optional
          type: object
        seccompProfile:
          allOf:
          - $ref: "#/components/schemas/v1.SeccompProfile"
          description: |-
            The seccomp options to use by the containers in this pod.
            Note that this field cannot be set when spec.os.name is windows.
            +optional
          type: object
        supplementalGroups:
          description: |-
            A list of groups applied to the first process run in each container, in
            addition to the container's primary GID and fsGroup (if specified).  If
            the SupplementalGroupsPolicy feature is enabled, the
            supplementalGroupsPolicy field determines whether these are in addition
            to or instead of any group memberships defined in the container image.
            If unspecified, no additional groups are added, though group memberships
            defined in the container image may still be used, depending on the
            supplementalGroupsPolicy field.
            Note that this field cannot be set when spec.os.name is windows.
            +optional
            +listType=atomic
          items:
            type: integer
          type: array
        supplementalGroupsPolicy:
          allOf:
          - $ref: "#/components/schemas/v1.SupplementalGroupsPolicy"
          description: |-
            Defines how supplemental groups of the first container processes are calculated.
            Valid values are "Merge" and "Strict". If not specified, "Merge" is used.
