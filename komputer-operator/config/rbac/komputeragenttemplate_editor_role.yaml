# This rule is not used by the project komputer-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the komputer.komputer.ai.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: komputer-operator
    app.kubernetes.io/managed-by: kustomize
  name: komputeragenttemplate-editor-role
rules:
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeragenttemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeragenttemplates/status
  verbs:
  - get
