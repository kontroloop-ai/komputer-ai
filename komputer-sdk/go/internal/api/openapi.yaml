openapi: 3.0.1
info:
  contact: {}
  description: |-
    API-first platform for running persistent Claude AI agents on Kubernetes.
    Designed to be driven by external systems — create agents, send tasks, and stream real-time results via REST + WebSocket.
  title: komputer.ai API
  version: "1.0"
servers:
- url: //localhost:8080/api/v1
paths:
  /agents:
    get:
      description: Returns all agents with their current status in the specified namespace.
      operationId: listAgents
      parameters:
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
          description: List of agents
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: List agents
      tags:
      - agents
    post:
      description: |-
        Creates a new agent or sends a task to an existing idle agent (upsert by name).
        If the agent doesn't exist, it is created. If it exists and is idle, the task is forwarded.
      operationId: createAgent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
        description: Agent creation request
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
          description: Task forwarded to existing agent
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
          description: Agent created
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad request
        "409":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Agent is busy or has no running pod
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Create agent or send task
      tags:
      - agents
      x-codegen-request-body-name: request
  /agents/{name}:
    delete:
      description: "Deletes the agent CR, pod, PVC, secrets, and Redis event stream."
      operationId: deleteAgent
      parameters:
      - description: Agent name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Agent deleted
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Agent not found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Delete agent
      tags:
      - agents
    get:
      description: Returns the current status and metadata for a single agent.
      operationId: getAgent
      parameters:
      - description: Agent name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
          description: Agent details
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Agent not found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Get agent details
      tags:
      - agents
    patch:
      description: "Updates model, lifecycle, instructions, secretRefs, memories,\
        \ skills, or connectors on an existing agent."
      operationId: patchAgent
      parameters:
      - description: Agent name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchAgentRequest"
        description: Fields to update
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
          description: Updated agent
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Patch agent
      tags:
      - agents
      x-codegen-request-body-name: request
  /agents/{name}/cancel:
    post:
      description: Gracefully cancels the currently running task. The agent pod stays
        alive for future tasks.
      operationId: cancelAgentTask
      parameters:
      - description: Agent name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Task cancelling
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Agent not found
        "409":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Agent has no running pod
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Cancel agent task
      tags:
      - agents
  /agents/{name}/events:
    get:
      description: Returns recent events from the agent's Redis stream in chronological
        order.
      operationId: getAgentEvents
      parameters:
      - description: Agent name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      - description: Max events to return (1-200)
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Agent events
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Invalid limit parameter
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Get agent events
      tags:
      - agents
  /agents/{name}/ws:
    get:
      description: "Upgrades to a WebSocket connection to stream real-time agent events.\
        \ Events include task_started, thinking, tool_call, tool_result, text, task_completed,\
        \ task_cancelled, and error."
      parameters:
      - description: Agent name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      summary: Stream agent events (WebSocket)
      tags:
      - agents
  /connectors:
    get:
      description: Returns all connectors with attached agent counts in the specified
        namespace.
      operationId: listConnectors
      parameters:
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: List of connectors
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: List connectors
      tags:
      - connectors
    post:
      description: Creates a new KomputerConnector CR pointing to an MCP server that
        can be attached to agents.
      operationId: createConnector
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConnectorRequest"
        description: Connector creation request
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorResponse"
          description: Connector created
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Create connector
      tags:
      - connectors
      x-codegen-request-body-name: request
  /connectors/{name}:
    delete:
      description: Deletes the connector CR.
      operationId: deleteConnector
      parameters:
      - description: Connector name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Connector deleted
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Delete connector
      tags:
      - connectors
    get:
      description: "Returns the URL, service, type, and auth config for a single connector."
      operationId: getConnector
      parameters:
      - description: Connector name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorResponse"
          description: Connector details
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Connector not found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Get connector details
      tags:
      - connectors
  /connectors/{name}/tools:
    get:
      description: Calls the MCP server's tools/list endpoint and returns the available
        tools.
      operationId: listConnectorTools
      parameters:
      - description: Connector name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: List of MCP tools
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Connector not found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
        "502":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Failed to reach MCP server
      summary: List connector tools
      tags:
      - connectors
  /memories:
    get:
      description: Returns all memories with content and attached agent counts in
