          hostPort: 5
        - protocol: "{}"
          hostIP: hostIP
          name: name
          containerPort: 1
          hostPort: 5
        volumeMounts:
        - mountPath: mountPath
          mountPropagation: "{}"
          name: name
          readOnly: true
          subPath: subPath
          recursiveReadOnly: "{}"
          subPathExpr: subPathExpr
        - mountPath: mountPath
          mountPropagation: "{}"
          name: name
          readOnly: true
          subPath: subPath
          recursiveReadOnly: "{}"
          subPathExpr: subPathExpr
        lifecycle: "{}"
        readinessProbe: "{}"
        resizePolicy:
        - resourceName: "{}"
          restartPolicy: "{}"
        - resourceName: "{}"
          restartPolicy: "{}"
        envFrom:
        - configMapRef: "{}"
          prefix: prefix
          secretRef: "{}"
        - configMapRef: "{}"
          prefix: prefix
          secretRef: "{}"
        image: image
        imagePullPolicy: "{}"
        livenessProbe: "{}"
        terminationMessagePath: terminationMessagePath
        workingDir: workingDir
        resources: "{}"
        env:
        - name: name
          value: value
          valueFrom: "{}"
        - name: name
          value: value
          valueFrom: "{}"
        restartPolicy: "{}"
        command:
        - command
        - command
        args:
        - args
        - args
        name: name
        tty: true
        stdinOnce: true
      properties:
        args:
          description: |-
            Arguments to the entrypoint.
            The container image's CMD is used if this is not provided.
            Variable references $(VAR_NAME) are expanded using the container's environment. If a variable
            cannot be resolved, the reference in the input string will be unchanged. Double $$ are reduced
            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e. "$$(VAR_NAME)" will
            produce the string literal "$(VAR_NAME)". Escaped references will never be expanded, regardless
            of whether the variable exists or not. Cannot be updated.
            More info: https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/#running-a-command-in-a-shell
            +optional
            +listType=atomic
          items:
            type: string
          type: array
        command:
          description: |-
            Entrypoint array. Not executed within a shell.
            The container image's ENTRYPOINT is used if this is not provided.
            Variable references $(VAR_NAME) are expanded using the container's environment. If a variable
            cannot be resolved, the reference in the input string will be unchanged. Double $$ are reduced
            to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e. "$$(VAR_NAME)" will
            produce the string literal "$(VAR_NAME)". Escaped references will never be expanded, regardless
            of whether the variable exists or not. Cannot be updated.
            More info: https://kubernetes.io/docs/tasks/inject-data-application/define-command-argument-container/#running-a-command-in-a-shell
            +optional
            +listType=atomic
          items:
            type: string
          type: array
        env:
          description: |-
            List of environment variables to set in the container.
            Cannot be updated.
            +optional
            +patchMergeKey=name
            +patchStrategy=merge
            +listType=map
            +listMapKey=name
          items:
            $ref: "#/components/schemas/v1.EnvVar"
          type: array
        envFrom:
          description: |-
            List of sources to populate environment variables in the container.
            The keys defined within a source may consist of any printable ASCII characters except '='.
            When a key exists in multiple
            sources, the value associated with the last source will take precedence.
            Values defined by an Env with a duplicate key will take precedence.
            Cannot be updated.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.EnvFromSource"
          type: array
        image:
          description: |-
            Container image name.
            More info: https://kubernetes.io/docs/concepts/containers/images
            This field is optional to allow higher level config management to default or override
            container images in workload controllers like Deployments and StatefulSets.
            +optional
          type: string
        imagePullPolicy:
          allOf:
          - $ref: "#/components/schemas/v1.PullPolicy"
          description: |-
            Image pull policy.
            One of Always, Never, IfNotPresent.
            Defaults to Always if :latest tag is specified, or IfNotPresent otherwise.
            Cannot be updated.
            More info: https://kubernetes.io/docs/concepts/containers/images#updating-images
            +optional
          type: object
        lifecycle:
          allOf:
          - $ref: "#/components/schemas/v1.Lifecycle"
          description: |-
            Actions that the management system should take in response to container lifecycle events.
            Cannot be updated.
            +optional
          type: object
        livenessProbe:
          allOf:
          - $ref: "#/components/schemas/v1.Probe"
          description: |-
            Periodic probe of container liveness.
            Container will be restarted if the probe fails.
            Cannot be updated.
            More info: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle#container-probes
            +optional
          type: object
        name:
          description: |-
            Name of the container specified as a DNS_LABEL.
            Each container in a pod must have a unique name (DNS_LABEL).
            Cannot be updated.
          type: string
        ports:
          description: |-
            List of ports to expose from the container. Not specifying a port here
            DOES NOT prevent that port from being exposed. Any port which is
            listening on the default "0.0.0.0" address inside a container will be
            accessible from the network.
            Modifying this array with strategic merge patch may corrupt the data.
            For more information See https://github.com/kubernetes/kubernetes/issues/108255.
            Cannot be updated.
            +optional
            +patchMergeKey=containerPort
            +patchStrategy=merge
            +listType=map
            +listMapKey=containerPort
            +listMapKey=protocol
          items:
            $ref: "#/components/schemas/v1.ContainerPort"
          type: array
        readinessProbe:
          allOf:
          - $ref: "#/components/schemas/v1.Probe"
          description: |-
            Periodic probe of container service readiness.
            Container will be removed from service endpoints if the probe fails.
            Cannot be updated.
            More info: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle#container-probes
            +optional
          type: object
        resizePolicy:
          description: |-
            Resources resize policy for the container.
            This field cannot be set on ephemeral containers.
            +featureGate=InPlacePodVerticalScaling
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.ContainerResizePolicy"
          type: array
        resources:
          allOf:
          - $ref: "#/components/schemas/v1.ResourceRequirements"
          description: |-
            Compute Resources required by this container.
            Cannot be updated.
            More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
            +optional
          type: object
        restartPolicy:
          allOf:
          - $ref: "#/components/schemas/v1.ContainerRestartPolicy"
          description: |-
            RestartPolicy defines the restart behavior of individual containers in a pod.
            This overrides the pod-level restart policy. When this field is not specified,
            the restart behavior is defined by the Pod's restart policy and the container type.
            Additionally, setting the RestartPolicy as "Always" for the init container will
            have the following effect:
            this init container will be continually restarted on
            exit until all regular containers have terminated. Once all regular
            containers have completed, all init containers with restartPolicy "Always"
            will be shut down. This lifecycle differs from normal init containers and
            is often referred to as a "sidecar" container. Although this init
            container still starts in the init container sequence, it does not wait
            for the container to complete before proceeding to the next init
            container. Instead, the next init container starts immediately after this
            init container is started, or after any startupProbe has successfully
            completed.
            +optional
          type: object
        restartPolicyRules:
          description: |-
            Represents a list of rules to be checked to determine if the
            container should be restarted on exit. The rules are evaluated in
            order. Once a rule matches a container exit condition, the remaining
            rules are ignored. If no rule matches the container exit condition,
            the Container-level restart policy determines the whether the container
            is restarted or not. Constraints on the rules:
            - At most 20 rules are allowed.
            - Rules can have the same action.
            - Identical rules are not forbidden in validations.
            When rules are specified, container MUST set RestartPolicy explicitly
            even it if matches the Pod's RestartPolicy.
            +featureGate=ContainerRestartRules
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.ContainerRestartRule"
          type: array
        securityContext:
          allOf:
          - $ref: "#/components/schemas/v1.SecurityContext"
          description: |-
            SecurityContext defines the security options the container should be run with.
            If set, the fields of SecurityContext override the equivalent fields of PodSecurityContext.
            More info: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
            +optional
          type: object
        startupProbe:
          allOf:
          - $ref: "#/components/schemas/v1.Probe"
          description: |-
            StartupProbe indicates that the Pod has successfully initialized.
            If specified, no other probes are executed until this completes successfully.
            If this probe fails, the Pod will be restarted, just as if the livenessProbe failed.
            This can be used to provide different probe parameters at the beginning of a Pod's lifecycle,
            when it might take a long time to load data or warm a cache, than during steady-state operation.
            This cannot be updated.
            More info: https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle#container-probes
            +optional
          type: object
        stdin:
          description: |-
            Whether this container should allocate a buffer for stdin in the container runtime. If this
            is not set, reads from stdin in the container will always result in EOF.
            Default is false.
            +optional
          type: boolean
        stdinOnce:
          description: |-
            Whether the container runtime should close the stdin channel after it has been opened by
            a single attach. When stdin is true the stdin stream will remain open across multiple attach
            sessions. If stdinOnce is set to true, stdin is opened on container start, is empty until the
            first client attaches to stdin, and then remains open and accepts data until the client disconnects,
            at which time stdin is closed and remains closed until the container is restarted. If this
            flag is false, a container processes that reads from stdin will never receive an EOF.
            Default is false
            +optional
          type: boolean
        terminationMessagePath:
          description: |-
            Optional: Path at which the file to which the container's termination message
            will be written is mounted into the container's filesystem.
            Message written is intended to be brief final status, such as an assertion failure message.
            Will be truncated by the node if greater than 4096 bytes. The total message length across
            all containers will be limited to 12kb.
            Defaults to /dev/termination-log.
            Cannot be updated.
            +optional
          type: string
        terminationMessagePolicy:
          allOf:
          - $ref: "#/components/schemas/v1.TerminationMessagePolicy"
          description: |-
            Indicate how the termination message should be populated. File will use the contents of
            terminationMessagePath to populate the container status message on both success and failure.
            FallbackToLogsOnError will use the last chunk of container log output if the termination
            message file is empty and the container exited with an error.
            The log output is limited to 2048 bytes or 80 lines, whichever is smaller.
            Defaults to File.
            Cannot be updated.
            +optional
          type: object
        tty:
          description: |-
            Whether this container should allocate a TTY for itself, also requires 'stdin' to be true.
            Default is false.
            +optional
          type: boolean
        volumeDevices:
          description: |-
            volumeDevices is the list of block devices to be used by the container.
            +patchMergeKey=devicePath
            +patchStrategy=merge
            +listType=map
            +listMapKey=devicePath
            +optional
          items:
            $ref: "#/components/schemas/v1.VolumeDevice"
          type: array
        volumeMounts:
          description: |-
            Pod volumes to mount into the container's filesystem.
            Cannot be updated.
            +optional
            +patchMergeKey=mountPath
            +patchStrategy=merge
            +listType=map
            +listMapKey=mountPath
          items:
            $ref: "#/components/schemas/v1.VolumeMount"
          type: array
        workingDir:
          description: |-
            Container's working directory.
            If not specified, the container runtime's default will be used, which
            might be configured in the container image.
            Cannot be updated.
            +optional
          type: string
      type: object
    v1.ContainerPort:
      example:
        protocol: "{}"
        hostIP: hostIP
        name: name
        containerPort: 1
        hostPort: 5
      properties:
        containerPort:
          description: |-
            Number of port to expose on the pod's IP address.
            This must be a valid port number, 0 < x < 65536.
