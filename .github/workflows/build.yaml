name: Build and Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      operator: ${{ steps.filter.outputs.operator }}
      api: ${{ steps.filter.outputs.api }}
      agent: ${{ steps.filter.outputs.agent }}
      ui: ${{ steps.filter.outputs.ui }}
      cli: ${{ steps.filter.outputs.cli }}
      helm: ${{ steps.filter.outputs.helm }}
      is_tag: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            operator:
              - 'komputer-operator/**'
            api:
              - 'komputer-api/**'
              - 'komputer-operator/api/**'
            agent:
              - 'komputer-agent/**'
            ui:
              - 'komputer-ui/**'
            cli:
              - 'komputer-cli/**'
            helm:
              - 'helm/**'

  operator:
    name: Build Operator
    needs: changes
    if: needs.changes.outputs.operator == 'true' || needs.changes.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/komputer-operator
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: komputer-operator
          file: komputer-operator/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          # platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  api:
    name: Build API
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/komputer-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: komputer-api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          # platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  agent:
    name: Build Agent
    needs: changes
    if: needs.changes.outputs.agent == 'true' || needs.changes.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/komputer-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: komputer-agent
          file: komputer-agent/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          # platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  ui:
    name: Build UI
    needs: changes
    if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/komputer-ui
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: komputer-ui
          file: komputer-ui/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          # platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  cli:
    name: Build CLI
    needs: changes
    if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: komputer-cli/go.sum

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd komputer-cli
          go build -o ../komputer-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: komputer-${{ matrix.goos }}-${{ matrix.goarch }}
          path: komputer-${{ matrix.goos }}-${{ matrix.goarch }}

  test:
    name: Run Tests
    needs: [changes, operator, api, agent, ui, cli]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: |
            komputer-api/go.sum
            komputer-cli/go.sum
            komputer-operator/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: komputer-ui/package-lock.json

      - name: Test API
        if: needs.changes.outputs.api == 'true' || needs.changes.outputs.is_tag == 'true'
        run: cd komputer-api && go test -v ./...

      - name: Install envtest binaries
        if: needs.changes.outputs.operator == 'true' || needs.changes.outputs.is_tag == 'true'
        run: |
          cd komputer-operator
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use -p path)" >> "$GITHUB_ENV"

      - name: Test Operator
        if: needs.changes.outputs.operator == 'true' || needs.changes.outputs.is_tag == 'true'
        run: cd komputer-operator && go test -v $(go list ./... | grep -v /test/e2e)

      - name: Test CLI
        if: needs.changes.outputs.cli == 'true' || needs.changes.outputs.is_tag == 'true'
        run: cd komputer-cli && go test -v ./...

      - name: Test UI
        if: needs.changes.outputs.ui == 'true' || needs.changes.outputs.is_tag == 'true'
        run: cd komputer-ui && npm ci && npm test

  sdk:
    name: SDK
    needs: [changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.is_tag == 'true'
    uses: ./.github/workflows/sdk.yaml
    with:
      is_tag: ${{ needs.changes.outputs.is_tag }}

  publish-sdk-python:
    name: Publish Python SDK
    needs: [changes, sdk]
    if: needs.changes.outputs.is_tag == 'true' && needs.sdk.result == 'success'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Convert to PEP 440: v0.1.0-beta → 0.1.0b0, v0.1.0-test → 0.1.0.dev0
          VERSION=$(echo "$VERSION" | sed 's/-alpha/.a0/;s/-beta/.b0/;s/-rc/.rc0/;s/-.*/.dev0/')
          cd komputer-sdk/python
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          pip install build -q
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: komputer-sdk/python/dist/

  publish-sdk-npm:
    name: Publish TypeScript SDK
    needs: [changes, sdk]
    if: needs.changes.outputs.is_tag == 'true' && needs.sdk.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build and publish
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cd komputer-sdk/typescript
          npm version ${VERSION} --no-git-tag-version
          npm ci
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  helm:
    name: Publish Helm Chart
    needs: [changes, test]
    if: needs.changes.outputs.is_tag == 'true' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update chart version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/^version:.*/version: ${VERSION}/" helm/komputer-ai/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/komputer-ai/Chart.yaml

      - name: Update image tags to release version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/tag: latest/tag: ${VERSION}/" helm/komputer-ai/values.yaml

      - name: Build dependencies
        run: |
          helm repo add dandydev https://dandydeveloper.github.io/charts/
          helm dependency build helm/komputer-ai

      - name: Package chart
        run: helm package helm/komputer-ai

      - name: Push to GHCR
        run: helm push komputer-ai-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

  release:
    name: Create Release
    needs: [changes, cli, test]
    if: needs.changes.outputs.is_tag == 'true' && needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: komputer-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: komputer-*
