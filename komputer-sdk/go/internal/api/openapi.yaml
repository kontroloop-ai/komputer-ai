    v1.ContainerRestartRuleAction:
      enum:
      - Restart
      - RestartAllContainers
      type: string
      x-enum-varnames:
      - ContainerRestartRuleActionRestart
      - ContainerRestartRuleActionRestartAllContainers
    v1.ContainerRestartRuleOnExitCodes:
      properties:
        operator:
          allOf:
          - $ref: "#/components/schemas/v1.ContainerRestartRuleOnExitCodesOperator"
          description: |-
            Represents the relationship between the container exit code(s) and the
            specified values. Possible values are:
            - In: the requirement is satisfied if the container exit code is in the
              set of specified values.
            - NotIn: the requirement is satisfied if the container exit code is
              not in the set of specified values.
            +required
          type: object
        values:
          description: |-
            Specifies the set of values to check for container exit codes.
            At most 255 elements are allowed.
            +optional
            +listType=set
          items:
            type: integer
          type: array
      type: object
    v1.ContainerRestartRuleOnExitCodesOperator:
      enum:
      - In
      - NotIn
      type: string
      x-enum-varnames:
      - ContainerRestartRuleOnExitCodesOpIn
      - ContainerRestartRuleOnExitCodesOpNotIn
