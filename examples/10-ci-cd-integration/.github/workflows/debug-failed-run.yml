name: Debug Failed Run

on:
  workflow_run:
    workflows: ["CI"]         # trigger whenever your main CI workflow finishes
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: "GitHub Actions run ID to debug"
        required: true

jobs:
  debug:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest

    steps:
      - name: Install komputer CLI
        env:
          KOMPUTER_API: ${{ secrets.KOMPUTER_API_URL }}
        run: |
          curl -sSL https://github.com/komputer-ai/komputer-ai/releases/latest/download/komputer-linux-amd64 \
            -o /usr/local/bin/komputer && chmod +x /usr/local/bin/komputer
          komputer login "$KOMPUTER_API"

      - name: Run debugging agent
        env:
          RUN_ID: ${{ inputs.run_id || github.event.workflow_run.id }}
        run: |
          komputer run ci-debugger \
            "A GitHub Actions run has failed in ${{ github.repository }} (run ID: $RUN_ID).
            Fetch the failed job logs, identify the root cause, and suggest a concrete fix." \
            --secret GITHUB=${{ secrets.GITHUB_TOKEN }} \
            --lifecycle AutoDelete
