      operationId: deleteOffice
      parameters:
      - description: Office name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Office deleted
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Office not found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Delete office
      tags:
      - offices
    get:
      description: Returns the current status and member list for a single office.
      operationId: getOffice
      parameters:
      - description: Office name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
