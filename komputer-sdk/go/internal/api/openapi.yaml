        restartPolicyRules:
        - action: "{}"
          exitCodes: "{}"
        - action: "{}"
          exitCodes: "{}"
        stdin: true
        terminationMessagePolicy: "{}"
        securityContext: "{}"
        startupProbe: "{}"
        ports:
        - protocol: "{}"
          hostIP: hostIP
