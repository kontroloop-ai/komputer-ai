        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Office not found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Get office details
      tags:
      - offices
  /offices/{name}/events:
    get:
      description: "Returns merged events from all member agent Redis streams, sorted\
        \ chronologically."
      operationId: getOfficeEvents
      parameters:
      - description: Office name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      - description: Max events to return (1-200)
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: Office events
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Invalid limit parameter
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Office not found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Get office events
      tags:
      - offices
  /schedules:
    get:
      description: Returns all schedules with their current status and run history
        in the specified namespace.
      operationId: listSchedules
      parameters:
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleListResponse"
          description: List of schedules
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: List schedules
      tags:
      - schedules
    post:
      description: Creates a new KomputerSchedule CR that triggers agent tasks on
        a cron schedule.
      operationId: createSchedule
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduleRequest"
        description: Schedule creation request
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleResponse"
          description: Schedule created
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Create schedule
      tags:
      - schedules
      x-codegen-request-body-name: request
  /schedules/{name}:
    delete:
      description: Deletes the schedule CR. Does not delete any agents that were created
