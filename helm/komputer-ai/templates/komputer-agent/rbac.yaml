{{- if .Values.agent.serviceAccount.create }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.agent.serviceAccount.clusterWide }}
kind: ClusterRole
{{- else }}
kind: Role
{{- end }}
metadata:
  name: {{ .Release.Name }}-agent
  {{- if not .Values.agent.serviceAccount.clusterWide }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "komputer.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
rules:
  {{- toYaml .Values.agent.serviceAccount.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.agent.serviceAccount.clusterWide }}
kind: ClusterRoleBinding
{{- else }}
kind: RoleBinding
{{- end }}
metadata:
  name: {{ .Release.Name }}-agent
  {{- if not .Values.agent.serviceAccount.clusterWide }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "komputer.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  {{- if .Values.agent.serviceAccount.clusterWide }}
  kind: ClusterRole
  {{- else }}
  kind: Role
  {{- end }}
  name: {{ .Release.Name }}-agent
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-agent
  namespace: {{ .Release.Namespace }}
{{- end }}
