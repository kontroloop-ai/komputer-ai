        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Get memory details
      tags:
      - memories
    patch:
      description: Updates the content or description of an existing memory.
      operationId: patchMemory
      parameters:
      - description: Memory name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMemoryRequest"
        description: Fields to update
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
          description: Updated memory
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Patch memory
      tags:
      - memories
      x-codegen-request-body-name: request
  /namespaces:
    get:
      description: Returns all Kubernetes namespaces the API has access to.
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: List of namespaces
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: List namespaces
      tags:
      - templates
  /offices:
    get:
      description: Returns all offices with their current status in the specified
        namespace.
      operationId: listOffices
      parameters:
      - description: Kubernetes namespace
        explode: true
        in: query
