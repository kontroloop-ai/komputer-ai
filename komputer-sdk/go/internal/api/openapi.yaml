        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: List of memories
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: List memories
      tags:
      - memories
    post:
      description: Creates a new KomputerMemory CR that can be attached to agents
        as persistent context.
      operationId: createMemory
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoryRequest"
        description: Memory creation request
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
          description: Memory created
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Create memory
      tags:
      - memories
      x-codegen-request-body-name: request
  /memories/{name}:
    delete:
      description: Deletes the memory CR.
      operationId: deleteMemory
      parameters:
      - description: Memory name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Memory deleted
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Delete memory
      tags:
      - memories
    get:
      description: Returns the content and attached agent count for a single memory.
      operationId: getMemory
      parameters:
      - description: Memory name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
          description: Memory details
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Memory not found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Get memory details
      tags:
      - memories
    patch:
      description: Updates the content or description of an existing memory.
      operationId: patchMemory
      parameters:
      - description: Memory name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMemoryRequest"
        description: Fields to update
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryResponse"
          description: Updated memory
        "400":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Bad request
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Patch memory
      tags:
      - memories
      x-codegen-request-body-name: request
  /namespaces:
    get:
      description: Returns all Kubernetes namespaces the API has access to.
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
          description: List of namespaces
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: List namespaces
      tags:
      - templates
  /offices:
    get:
      description: Returns all offices with their current status in the specified
        namespace.
      operationId: listOffices
      parameters:
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficeListResponse"
          description: List of offices
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: List offices
      tags:
      - offices
  /offices/{name}:
    delete:
      description: Deletes the office CR and cleans up Redis event streams for all
        member agents.
      operationId: deleteOffice
      parameters:
      - description: Office name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Office deleted
        "404":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Office not found
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
          description: Internal error
      summary: Delete office
      tags:
      - offices
    get:
      description: Returns the current status and member list for a single office.
      operationId: getOffice
      parameters:
      - description: Office name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Kubernetes namespace
        explode: true
        in: query
        name: namespace
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
