apiVersion: komputer.komputer.ai/v1alpha1
kind: KomputerAgentClusterTemplate
metadata:
  name: default
  labels:
    {{- include "komputer.labels" . | nindent 4 }}
spec:
  podSpec:
    {{- if .Values.agent.serviceAccount.create }}
    serviceAccountName: {{ .Release.Name }}-agent
    {{- end }}
    {{- with .Values.imagePullSecrets }}
    imagePullSecrets:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    containers:
    - name: agent
      image: {{ .Values.agent.image.repository }}:{{ .Values.agent.image.tag }}
      imagePullPolicy: {{ .Values.agent.image.pullPolicy }}
      env:
      {{- if .Values.bedrock.enabled }}
      - name: CLAUDE_CODE_USE_BEDROCK
        value: "1"
      - name: AWS_REGION
        value: {{ .Values.bedrock.region | quote }}
      {{- else }}
      - name: ANTHROPIC_API_KEY
        valueFrom:
          secretKeyRef:
            name: {{ .Values.anthropicApiKeySecret.name }}
            key: {{ .Values.anthropicApiKeySecret.key }}
      {{- end }}
      resources:
        {{- toYaml .Values.clusterTemplate.resources | nindent 8 }}
  storage:
    size: {{ .Values.clusterTemplate.storageSize }}
