name: SDK — Regenerate & Test

on:
  workflow_call:
    inputs:
      is_tag:
        required: true
        type: string

jobs:
  regenerate:
    name: Regenerate SDKs
    if: inputs.is_tag != 'true' && github.actor != 'sdk-bot-komputer-ai[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.SDK_BOT_APP_ID }}
          private-key: ${{ secrets.SDK_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: komputer-api/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          pip install pyyaml -q

      - name: Regenerate SDKs
        run: cd komputer-sdk && make all

      - name: Commit regenerated SDKs
        run: |
          git config user.name "sdk-bot-komputer-ai[bot]"
          git config user.email "sdk-bot-komputer-ai[bot]@users.noreply.github.com"
          git add komputer-sdk/
          if git diff --cached --quiet; then
            echo "No SDK changes to commit"
          else
            git commit -m "chore(sdk): regenerate SDKs [skip ci]"
            git push
          fi

  test:
    name: Test SDKs
    needs: [regenerate]
    if: ${{ !cancelled() && (needs.regenerate.result == 'success' || needs.regenerate.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: komputer-sdk/go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test Python SDK
        run: |
          cd komputer-sdk/python
          pip install -e . pytest -q
          pytest tests/ --ignore=tests/integration -v

      - name: Test Go SDK
        run: cd komputer-sdk/go && go test -v ./...

      - name: Test TypeScript SDK
        run: cd komputer-sdk/typescript && npm ci && npx vitest run
