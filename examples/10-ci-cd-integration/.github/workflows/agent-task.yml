name: Run Agent Task

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: "Agent name"
        required: true
        default: "ci-agent"
      instructions:
        description: "Task instructions"
        required: true

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Create agent and wait for completion
        env:
          KOMPUTER_API: ${{ secrets.KOMPUTER_API_URL }}
        run: |
          # Create or re-task the agent
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$KOMPUTER_API/api/v1/agents" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${{ inputs.agent_name }}\",\"instructions\":\"${{ inputs.instructions }}\",\"lifecycle\":\"Sleep\"}")

          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "Failed to create agent (HTTP $STATUS)"
            exit 1
          fi

          echo "Agent created, polling for completion..."

          # Poll until task is no longer InProgress
          for i in $(seq 1 60); do
            TASK_STATUS=$(curl -s "$KOMPUTER_API/api/v1/agents/${{ inputs.agent_name }}" \
              | jq -r '.taskStatus // "unknown"')

            echo "[$i/60] taskStatus=$TASK_STATUS"

            if [ "$TASK_STATUS" = "Complete" ]; then
              echo "Task completed successfully."
              exit 0
            elif [ "$TASK_STATUS" = "Error" ]; then
              echo "Task failed with error."
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for task completion."
          exit 1

      - name: Fetch task result
        env:
          KOMPUTER_API: ${{ secrets.KOMPUTER_API_URL }}
        run: |
          curl -s "$KOMPUTER_API/api/v1/agents/${{ inputs.agent_name }}/events?limit=5" \
            | jq -r '.events[] | select(.type == "task_completed") | .payload.result'
