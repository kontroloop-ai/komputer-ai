apiVersion: komputer.komputer.ai/v1alpha1
kind: KomputerAgentTemplate
metadata:
  name: default
spec:
  anthropicKeySecretRef:
    name: anthropic-api-key
    key: api-key
  podSpec:
    containers:
      - name: agent
        image: komputer-agent:latest
        imagePullPolicy: Never
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "100m"
            memory: "256Mi"
  storage:
    size: "2Gi"
