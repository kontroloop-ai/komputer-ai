apiVersion: komputer.komputer.ai/v1alpha1
kind: KomputerConfig
metadata:
  name: default
spec:
  redis:
    address: "redis.default:6379"
    db: 0
    streamPrefix: "komputer-events"
    passwordSecret:
      name: "redis-secret"
      key: "password"
      # Namespace where the source Secret lives. The operator mirrors it
      # into every agent namespace from here. Defaults to the namespace
      # the operator runs in when omitted.
      namespace: "default"
  apiURL: "http://localhost:8080"
