        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficeListResponse"
          description: List of offices
        "500":
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
