      type: string
      x-enum-varnames:
      - MountPropagationNone
      - MountPropagationHostToContainer
      - MountPropagationBidirectional
    v1.NFSVolumeSource:
      properties:
        path:
          description: |-
            path that is exported by the NFS server.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#nfs
          type: string
        readOnly:
          description: |-
            readOnly here will force the NFS export to be mounted with read-only permissions.
            Defaults to false.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#nfs
            +optional
          type: boolean
        server:
          description: |-
            server is the hostname or IP address of the NFS server.
            More info: https://kubernetes.io/docs/concepts/storage/volumes#nfs
          type: string
      type: object
    v1.NodeAffinity:
      properties:
        preferredDuringSchedulingIgnoredDuringExecution:
          description: |-
            The scheduler will prefer to schedule pods to nodes that satisfy
            the affinity expressions specified by this field, but it may choose
            a node that violates one or more of the expressions. The node that is
            most preferred is the one with the greatest sum of weights, i.e.
            for each node that meets all of the scheduling requirements (resource
            request, requiredDuringScheduling affinity expressions, etc.),
            compute a sum by iterating through the elements of this field and adding
            "weight" to the sum if the node matches the corresponding matchExpressions; the
            node(s) with the highest sum are the most preferred.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.PreferredSchedulingTerm"
          type: array
        requiredDuringSchedulingIgnoredDuringExecution:
          allOf:
          - $ref: "#/components/schemas/v1.NodeSelector"
          description: |-
            If the affinity requirements specified by this field are not met at
            scheduling time, the pod will not be scheduled onto the node.
            If the affinity requirements specified by this field cease to be met
            at some point during pod execution (e.g. due to an update), the system
            may or may not try to eventually evict the pod from its node.
            +optional
          type: object
      type: object
    v1.NodeInclusionPolicy:
      enum:
      - Ignore
      - Honor
      type: string
      x-enum-varnames:
      - NodeInclusionPolicyIgnore
      - NodeInclusionPolicyHonor
    v1.NodeSelector:
      properties:
        nodeSelectorTerms:
          description: |-
            Required. A list of node selector terms. The terms are ORed.
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.NodeSelectorTerm"
          type: array
      type: object
    v1.NodeSelectorOperator:
      enum:
      - In
      - NotIn
      - Exists
      - DoesNotExist
      - Gt
      - Lt
      type: string
      x-enum-varnames:
      - NodeSelectorOpIn
      - NodeSelectorOpNotIn
      - NodeSelectorOpExists
      - NodeSelectorOpDoesNotExist
      - NodeSelectorOpGt
      - NodeSelectorOpLt
    v1.NodeSelectorRequirement:
      properties:
        key:
          description: The label key that the selector applies to.
          type: string
        operator:
          allOf:
          - $ref: "#/components/schemas/v1.NodeSelectorOperator"
          description: |-
            Represents a key's relationship to a set of values.
            Valid operators are In, NotIn, Exists, DoesNotExist. Gt, and Lt.
          type: object
        values:
          description: |-
            An array of string values. If the operator is In or NotIn,
            the values array must be non-empty. If the operator is Exists or DoesNotExist,
            the values array must be empty. If the operator is Gt or Lt, the values
            array must have a single element, which will be interpreted as an integer.
            This array is replaced during a strategic merge patch.
            +optional
            +listType=atomic
          items:
            type: string
          type: array
      type: object
    v1.NodeSelectorTerm:
      properties:
        matchExpressions:
          description: |-
            A list of node selector requirements by node's labels.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.NodeSelectorRequirement"
          type: array
        matchFields:
          description: |-
            A list of node selector requirements by node's fields.
            +optional
            +listType=atomic
          items:
            $ref: "#/components/schemas/v1.NodeSelectorRequirement"
          type: array
      type: object
    v1.OSName:
      enum:
      - linux
      - windows
      type: string
      x-enum-varnames:
      - Linux
      - Windows
    v1.ObjectFieldSelector:
      properties:
        apiVersion:
          description: |-
            Version of the schema the FieldPath is written in terms of, defaults to "v1".
            +optional
          type: string
