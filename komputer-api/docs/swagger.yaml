basePath: /api/v1
definitions:
  main.AgentListResponse:
    properties:
      agents:
        items:
          $ref: '#/definitions/main.AgentResponse'
        type: array
    type: object
  main.AgentResponse:
    properties:
      connectors:
        description: KomputerConnector names attached to this agent
        items:
          type: string
        type: array
      createdAt:
        type: string
      instructions:
        description: User task (spec.instructions)
        type: string
      lastTaskCostUSD:
        type: string
      lastTaskMessage:
        type: string
      lifecycle:
        type: string
      memories:
        description: KomputerMemory names attached to this agent
        items:
          type: string
        type: array
      model:
        type: string
      modelContextWindow:
        type: integer
      name:
        type: string
      namespace:
        type: string
      secrets:
        description: Key names from K8s Secrets (not values)
        items:
          type: string
        type: array
      skills:
        description: KomputerSkill names attached to this agent
        items:
          type: string
        type: array
      status:
        type: string
      systemPrompt:
        description: Custom system prompt (spec.systemPrompt)
        type: string
      taskStatus:
        type: string
      totalCostUSD:
        type: string
      totalTokens:
        type: integer
    type: object
  main.ConnectorResponse:
    properties:
      agentNames:
        items:
          type: string
        type: array
      attachedAgents:
        type: integer
      authSecretKey:
        type: string
      authSecretName:
        type: string
      authType:
        type: string
      createdAt:
        type: string
      displayName:
        type: string
      name:
        type: string
      namespace:
        type: string
      oauthStatus:
        description: '"pending", "connected", ""'
        type: string
      service:
        type: string
      type:
        type: string
      url:
        type: string
    type: object
  main.CreateAgentRequest:
    properties:
      connectors:
        description: optional KomputerConnector names to attach
        items:
          type: string
        type: array
      instructions:
        type: string
      lifecycle:
        description: '"", "Sleep", or "AutoDelete"'
        type: string
      memories:
        description: optional KomputerMemory names to attach
        items:
          type: string
        type: array
      model:
        type: string
      name:
        type: string
      namespace:
        description: optional, defaults to server default
        type: string
      officeManager:
        description: set by manager MCP tool
        type: string
      role:
        description: '"manager" or "" (default manager)'
        type: string
      secretRefs:
        description: names of existing K8s Secrets to attach
        items:
          type: string
        type: array
      skills:
        description: optional KomputerSkill names to attach
        items:
          type: string
        type: array
      systemPrompt:
        description: optional custom system prompt
        type: string
      templateRef:
        type: string
    required:
    - instructions
    - name
    type: object
  main.CreateConnectorRequest:
    properties:
      authSecretKey:
        type: string
      authSecretName:
        type: string
      authType:
        description: '"token" or "oauth"'
        type: string
      displayName:
        type: string
      name:
        type: string
      namespace:
        type: string
      oauthClientId:
        description: OAuth client ID (stored in secret)
        type: string
      oauthClientSecret:
        description: OAuth client secret (stored in secret)
        type: string
      service:
        type: string
      type:
        type: string
      url:
        type: string
    required:
    - name
    - service
    - url
    type: object
  main.CreateMemoryRequest:
    properties:
      content:
        type: string
      description:
        type: string
      name:
        type: string
      namespace:
        type: string
    required:
    - content
    - name
    type: object
  main.CreateScheduleAgentSpec:
    properties:
      lifecycle:
        type: string
      model:
        type: string
      role:
        type: string
      secretRefs:
        items:
          type: string
        type: array
      templateRef:
        type: string
    type: object
  main.CreateScheduleRequest:
    properties:
      agent:
        $ref: '#/definitions/main.CreateScheduleAgentSpec'
      agentName:
        type: string
      autoDelete:
        type: boolean
      instructions:
        type: string
      keepAgents:
        type: boolean
      name:
        type: string
      namespace:
        type: string
      schedule:
        type: string
      timezone:
        type: string
    required:
    - instructions
    - name
    - schedule
    type: object
  main.CreateSecretRequest:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      name:
        type: string
      namespace:
        type: string
    required:
    - data
    - name
    type: object
  main.CreateSkillRequest:
    properties:
      content:
        type: string
      description:
        type: string
      name:
        type: string
      namespace:
        type: string
    required:
    - content
    - description
    - name
    type: object
  main.MemoryResponse:
    properties:
      agentNames:
        items:
          type: string
        type: array
      attachedAgents:
        type: integer
      content:
        type: string
      createdAt:
        type: string
      description:
        type: string
      name:
        type: string
      namespace:
        type: string
    type: object
  main.OfficeListResponse:
    properties:
      offices:
        items:
          $ref: '#/definitions/main.OfficeResponse'
        type: array
    type: object
  main.OfficeMemberResponse:
    properties:
      lastTaskCostUSD:
        type: string
      name:
        type: string
      role:
        type: string
      taskStatus:
        type: string
    type: object
  main.OfficeResponse:
    properties:
      activeAgents:
        type: integer
      completedAgents:
        type: integer
      createdAt:
        type: string
      manager:
        type: string
      members:
        items:
          $ref: '#/definitions/main.OfficeMemberResponse'
        type: array
      name:
        type: string
      namespace:
        type: string
      phase:
        type: string
      totalAgents:
        type: integer
      totalCostUSD:
        type: string
      totalTokens:
        type: integer
    type: object
  main.PatchAgentRequest:
    properties:
      connectors:
        description: connector names to attach
        items:
          type: string
        type: array
      instructions:
        type: string
      lifecycle:
        type: string
      memories:
        description: memory names to attach
        items:
          type: string
        type: array
      model:
        type: string
      secretRefs:
        description: full replacement list of K8s secret names
        items:
          type: string
        type: array
      skills:
        description: skill names to attach
        items:
          type: string
        type: array
      systemPrompt:
        description: custom system prompt
        type: string
      templateRef:
        type: string
    type: object
  main.PatchMemoryRequest:
    properties:
      content:
        type: string
      description:
        type: string
    type: object
  main.PatchScheduleRequest:
    properties:
      schedule:
        type: string
    type: object
  main.PatchSkillRequest:
    properties:
      content:
        type: string
      description:
        type: string
    type: object
  main.ScheduleListResponse:
    properties:
      schedules:
        items:
          $ref: '#/definitions/main.ScheduleResponse'
        type: array
    type: object
  main.ScheduleResponse:
    properties:
      agentName:
        type: string
      autoDelete:
        type: boolean
      createdAt:
        type: string
      failedRuns:
        type: integer
      keepAgents:
        type: boolean
      lastRunCostUSD:
        type: string
      lastRunStatus:
        type: string
      lastRunTime:
        type: string
      lastRunTokens:
        type: integer
      name:
        type: string
      namespace:
        type: string
      nextRunTime:
        type: string
      phase:
        type: string
      runCount:
        type: integer
      schedule:
        type: string
      successfulRuns:
        type: integer
      timezone:
        type: string
      totalCostUSD:
        type: string
      totalTokens:
        type: integer
    type: object
  main.SecretListResponse:
    properties:
      secrets:
        items:
          $ref: '#/definitions/main.SecretResponse'
        type: array
    type: object
  main.SecretResponse:
    properties:
      agentName:
        type: string
      agentNames:
        items:
          type: string
        type: array
      attachedAgents:
        type: integer
      createdAt:
        type: string
      keys:
        items:
          type: string
        type: array
      managed:
        type: boolean
      name:
        type: string
      namespace:
        type: string
    type: object
  main.SkillResponse:
    properties:
      agentNames:
        items:
          type: string
        type: array
      attachedAgents:
        type: integer
      content:
        type: string
      createdAt:
        type: string
      description:
        type: string
      isDefault:
        type: boolean
      name:
        type: string
      namespace:
        type: string
    type: object
  main.UpdateSecretRequest:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      namespace:
        type: string
    required:
    - data
    type: object
host: localhost:8080
info:
  contact: {}
  description: |-
    API-first platform for running persistent Claude AI agents on Kubernetes.
    Designed to be driven by external systems — create agents, send tasks, and stream real-time results via REST + WebSocket.
  title: komputer.ai API
  version: "1.0"
paths:
  /agents:
    get:
      description: Returns all agents with their current status in the specified namespace.
      operationId: listAgents
      parameters:
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of agents
          schema:
            $ref: '#/definitions/main.AgentListResponse'
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List agents
      tags:
      - agents
    post:
      consumes:
      - application/json
      description: |-
        Creates a new agent or sends a task to an existing idle agent (upsert by name).
        If the agent doesn't exist, it is created. If it exists and is idle, the task is forwarded.
      operationId: createAgent
      parameters:
      - description: Agent creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.CreateAgentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Agent created or task forwarded
          schema:
            $ref: '#/definitions/main.AgentResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Agent is busy or has no running pod
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create agent or send task
      tags:
      - agents
  /agents/{name}:
    delete:
      description: Deletes the agent CR, pod, PVC, secrets, and Redis event stream.
      operationId: deleteAgent
      parameters:
      - description: Agent name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Agent deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Agent not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete agent
      tags:
      - agents
    get:
      description: Returns the current status and metadata for a single agent.
      operationId: getAgent
      parameters:
      - description: Agent name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Agent details
          schema:
            $ref: '#/definitions/main.AgentResponse'
        "404":
          description: Agent not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get agent details
      tags:
      - agents
    patch:
      consumes:
      - application/json
      description: Updates model, lifecycle, instructions, secretRefs, memories, skills,
        or connectors on an existing agent.
      operationId: patchAgent
      parameters:
      - description: Agent name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.PatchAgentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated agent
          schema:
            $ref: '#/definitions/main.AgentResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Patch agent
      tags:
      - agents
  /agents/{name}/cancel:
    post:
      description: Gracefully cancels the currently running task. The agent pod stays
        alive for future tasks.
      operationId: cancelAgentTask
      parameters:
      - description: Agent name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Task cancelling
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Agent not found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Agent has no running pod
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cancel agent task
      tags:
      - agents
  /agents/{name}/events:
    get:
      description: Returns recent events from the agent's Redis stream in chronological
        order.
      operationId: getAgentEvents
      parameters:
      - description: Agent name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      - default: 50
        description: Max events to return (1-200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Agent events
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid limit parameter
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get agent events
      tags:
      - agents
  /agents/{name}/ws:
    get:
      description: Upgrades to a WebSocket connection to stream real-time agent events.
        Events include task_started, thinking, tool_call, tool_result, text, task_completed,
        task_cancelled, and error.
      parameters:
      - description: Agent name
        in: path
        name: name
        required: true
        type: string
      responses: {}
      summary: Stream agent events (WebSocket)
      tags:
      - agents
  /connectors:
    get:
      description: Returns all connectors with attached agent counts in the specified
        namespace.
      operationId: listConnectors
      parameters:
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of connectors
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List connectors
      tags:
      - connectors
    post:
      consumes:
      - application/json
      description: Creates a new KomputerConnector CR pointing to an MCP server that
        can be attached to agents.
      operationId: createConnector
      parameters:
      - description: Connector creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.CreateConnectorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Connector created
          schema:
            $ref: '#/definitions/main.ConnectorResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create connector
      tags:
      - connectors
  /connectors/{name}:
    delete:
      description: Deletes the connector CR.
      operationId: deleteConnector
      parameters:
      - description: Connector name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Connector deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete connector
      tags:
      - connectors
    get:
      description: Returns the URL, service, type, and auth config for a single connector.
      operationId: getConnector
      parameters:
      - description: Connector name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Connector details
          schema:
            $ref: '#/definitions/main.ConnectorResponse'
        "404":
          description: Connector not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get connector details
      tags:
      - connectors
  /connectors/{name}/tools:
    get:
      description: Calls the MCP server's tools/list endpoint and returns the available
        tools.
      operationId: listConnectorTools
      parameters:
      - description: Connector name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of MCP tools
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Connector not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: Failed to reach MCP server
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List connector tools
      tags:
      - connectors
  /memories:
    get:
      description: Returns all memories with content and attached agent counts in
        the specified namespace.
      operationId: listMemories
      parameters:
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of memories
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List memories
      tags:
      - memories
    post:
      consumes:
      - application/json
      description: Creates a new KomputerMemory CR that can be attached to agents
        as persistent context.
      operationId: createMemory
      parameters:
      - description: Memory creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.CreateMemoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Memory created
          schema:
            $ref: '#/definitions/main.MemoryResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create memory
      tags:
      - memories
  /memories/{name}:
    delete:
      description: Deletes the memory CR.
      operationId: deleteMemory
      parameters:
      - description: Memory name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Memory deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete memory
      tags:
      - memories
    get:
      description: Returns the content and attached agent count for a single memory.
      operationId: getMemory
      parameters:
      - description: Memory name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Memory details
          schema:
            $ref: '#/definitions/main.MemoryResponse'
        "404":
          description: Memory not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get memory details
      tags:
      - memories
    patch:
      consumes:
      - application/json
      description: Updates the content or description of an existing memory.
      operationId: patchMemory
      parameters:
      - description: Memory name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.PatchMemoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated memory
          schema:
            $ref: '#/definitions/main.MemoryResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Patch memory
      tags:
      - memories
  /namespaces:
    get:
      description: Returns all Kubernetes namespaces the API has access to.
      produces:
      - application/json
      responses:
        "200":
          description: List of namespaces
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List namespaces
      tags:
      - templates
  /offices:
    get:
      description: Returns all offices with their current status in the specified
        namespace.
      operationId: listOffices
      parameters:
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of offices
          schema:
            $ref: '#/definitions/main.OfficeListResponse'
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List offices
      tags:
      - offices
  /offices/{name}:
    delete:
      description: Deletes the office CR and cleans up Redis event streams for all
        member agents.
      operationId: deleteOffice
      parameters:
      - description: Office name
        in: path
        name: name
        required: true
        type: string
      - description: Kubernetes namespace
        in: query
        name: namespace
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Office deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Office not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete office
      tags:
      - offices
    get:
      description: Returns the current status and member list for a single office.
