---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - pods
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeragentclustertemplates
  - komputeragenttemplates
  - komputerconfigs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeragents
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeragents/finalizers
  verbs:
  - update
- apiGroups:
  - komputer.komputer.ai
  resources:
  - komputeragents/status
  verbs:
  - get
  - patch
  - update
